  text: 參同契分章注重刋道藏輯要
  hash: sha256:bd38278fdf8b62b07673454b4d2e87991ab51dcfc703519e2fa83ea2448d9b8a
  markers:
  - {type: page-break, offset: 6, content: '', id: CK-KZ_KR5i0038_02p001a}
body:
  text: 參同契魏伯陽真人著廬陵山人上陽子注上卷大易總敘章第一乾坤者易之門戶衆卦之父母坎離匡廓運轂正軸牝牡四卦以為槖籥覆冒陰陽之道猶工御者凖繩墨執銜轡正規矩隨軌轍處中以制外數在律厯紀月節有五六經緯奉日使兼并為六十剛柔有表裏朔旦屯直事至暮蒙當受晝夜各一卦用之依次序既未至晦爽終則復更始日月為期度動靜有早晚春夏據內體從子至辰已秋冬當外用自午訖戌亥賞罰應春秋昏明順寒暑爻辭有仁義隨時發喜怒如是應四時五行得其理伏羲覩河圖始畫八卦黃帝堯舜垂衣裳而天下治取諸乾坤夏易歸藏以坤為首商曰連山以艮為首文王周易乾坤為首孔子翼曰乾坤其易之門戶耶乾陽物也坤陰物也又曰夫乾其靜也專其動也直是以大生焉夫坤其靜也翕其動也闢是以廣生焉伯陽仙翁深得三聖人之旨作周易參同契上翼三聖之道下航萬世之人首句直指曰乾坤易之門戶衆卦之父母上陽子曰夫乾之為物陽也故為易之戶坤之為物陰也故為易之門太極胚腪非得乾坤之門戶則天地何由而設位日月何由而光明人物何由而化生聖人何由而行其道哉是以乾動而直則陽太極而生陰坤動而闢則陰太極而生陽陰陽交錯而成離坎仲尼曰易有太極是生兩儀兩儀生四象四象生八卦是乾之用九也初乘坤而成復復中妊震復而為師師中妊坎師而謙謙中妊艮謙而豫震生於豫豫而比坎生於比比而剝艮生於剝則震坎艮三男皆妊生於坤矣坤之用六也初乘乾而成姤姤中娠巽姤而同人同人娠離同人而履履中娠兌履而小畜小畜生巽小畜而大有大有生離大有而夬夬生兌則巽離兌三女皆娠生於乾矣雌雄錯雜以類相胥則乾再交坤而成臨臨而泰泰而大壯大壯而夬是陽之求乎陰也坤再感乾而成遁遁而否否而觀觀而剝是陰之感乎陽也斯為乾生三女坤生三男由此而往三男三女迭為夫妻而六十卦次第生矣此之謂乾坤為衆卦之父母也何謂坎離匡廓蓋陽乘陰則乾中虛而為離陰乘陽則坤腹實而為坎故坎離繼乾坤之體而為陰陽之匡廓比乾坤之於坎離猶車輻之於轂軸乾坤正坎離之輻坎離輳乾坤之轂老子曰三十輻共一轂此大小伯陽之旨同也牝牡者牝乃畜之母牡乃畜之父故牝為陰物之通稱牡為陽物之總名合乾坤坎離言牝牡四卦其以牝牡而為槖籥猶用陰陽以為消息槖象陰之門籥類陽之戶喻乾坤坎離若天地間一槖籥耳用槖籥之道而生物者謂之物用槖籥之道而生人者謂之人用槖籥之道而超凡入聖者謂之聖聖人者善奪造化也善用坎離也善奪造化之道者猶良工凖繩墨而正規矩何事不成善用坎離之道者猶執銜轡以循軌轍何往不獲聖人者宇宙在乎手萬化生乎身也聖人者善處中以制外也明律厯而知數也律厯者律應造化之候厯紀周天之運一陽初生律應黃鐘自子至亥周天度始故一歲既周而陽復生於子也月節有五六月節者兩節為一月五六者五日為一候六候為一月是一月有三十日一日十二時兩卦十二爻則一日兩卦為之經緯一月六十卦以為表裏也朔旦屯直事至暮蒙當受者何謂也蓋震下坎上為屯震為長男而能復坎中之陽以施生育之德故謂屯直事又艮上坎下為蒙艮為少男而能聚坎中之陽以行溫養之功故謂蒙當受晝夜各一卦六十卦中皆有陰陽互施生養也晦朔為一月之始終早晚謹一日之動靜四時定一年之賞罰濟其美者賞之敗其事者罰之不失仁義喜怒之正要得四時五行之理此章大義總敘參同契之統指乾坤為易之門戶非便言金丹藥物火侯此書解者百有餘人少能深造其奧惟真一子彭曉雖知火藥而欠次第乃章章指為藥物火候篇篇指為丹鼎功夫其中或恐後人附會豈知仙翁述此一書無重復語上篇敘陰陽造化鍊成大丹之旨中篇又細議還返溫養防虞之用下篇乃擬法象備露成丹之詳上篇則次第而言中篇復條例而布何可淆混而不察上陽子分而注之分上篇為十五章以應上弦得丹之義中篇為十五章以應下弦丹成之義下篇為五章以為五行之成數所分之章取其旨意同者以為一章尋詳仙翁之本意次第鋪陳就中借託玄言直指金丹藥火鼎器造化細密使後來人易於領悟遵而行之從凡入聖作佛成仙其心傳口授之祕又不敢施於筆者噫世人德器涼薄誹謗易生是以古聖大賢立言垂訓不泄天寶散布於經文王孔子相傳曰周易明此道也黃帝老子相傳曰金丹明此道也釋迦達磨相傳曰大乘明此道也聖人慈悲方便接引皆欲世人俱明此道實衆生之階筏為萬世之梯航豈謂後人各執異見不立苦志參訪真師不明陰陽同類相胥各尚所聞愈差愈遠彼見周易則指為卜筮納甲之書又惡知同類得朋之道乎彼見鼎器之説則猜為金石爐火之事彼聞採取之説則猜為三峰採戰之術彼聞有為則疑是旁門邪徑彼聞無為則疑是打坐頑空彼聞大乘則執為禪宗空性惟資談論更不察聖人之道是用陰陽修之以出陰陽用世問法修之以出世間凡此等輩烏足以談參同契中之妙語耶昔王沖熙得劉海蟾金丹之旨而成道乃嘆曰舉世道人無能達此惟張平叔一人而已平叔遇聖師於成都作悟真篇以訓於後旨意詳切其元言奧語一與參同契合上陽子自遇聖師而後遍遊江湖間廣參博採無非謗談泥丸翠虛篇云後來依舊去參禪勘破多少野狐精邇來豈惟無平叔一人只要如沖熙者何從而得然説禪説性逞乾慧者比比皆是求其可入此門而聞聖人之道者億中無一則知沖熙之言為大悟而翠虛之語尤可憐古人謂談道者如牛毛明道者如兔角况求其行道之人乎先哲云愚人多不曉一聞便大笑上人心了了一聞便知竅今若有將此竅問是何物就喻之曰竅是陰陽之門戶如此豈不愈動其猜疑哉乾坤設位章第二天地設位而易行乎其中矣天地者乾坤之象也設位者列陰陽配合之位也易謂坎離坎離者乾坤二用二用無爻位周流行六虛往來既不定上下亦無常幽潛淪匿變化於中包囊萬物為道紀綱以無制有器用者空故推消息坎離沒亡言不苟造論不虛生引驗見效校度神明推類結字原理為證坎戊月精離已日光日月為易剛柔相當土旺四季羅絡終始靑赤黑白各居一方皆秉中宮戊已之功十翼繫辭天尊地卑乾坤定矣仙翁述曰天地設位而易行乎其中矣復自注曰天地者乾坤之象也設位者列陰陽配合之位也易謂坎離坎離者乾坤二用其言既詳其心太切豈謂世人信之不及愚而難悟翼曰分陰分陽迭用柔剛故易六位而成章二用者乾用九坤用六有用而無位用九見羣龍無首吉者君子行道而德之至也用六利永貞者言坤之德地道也妻道也臣道也地道無成而代有終也故坤之為用孤陰則無成是以用六從乾乃與類行也而乾用九匹坤西南得朋也乾坤變化各正性命乾之太始用九乘坤陽含其陰虛而成離坤之太乙用六承乾陰含其陽實而成坎是坎離得專陰陽之體變易而用包囊生育愈無停機如天上之日月忽忽而弦望忽忽而晦朔即如人身之陰陽忽忽而太極忽忽而無常易道屢遷變動不居乾坤毁則無以見易聖人以此洗心退藏於密而逆行易之道也文王周易每卦六爻故曰六位成章又曰周流六虛其往來消息既不定而上下盈虛亦無常故乾初變姤纍變至坤坤初變復纍變至夬又有三男三女互相交變且六十卦皆有纍變一卦暨遊魂歸魄共變八卦又有積變是一卦積變至六十四卦而六十四卦積變至四千九十六卦復姤互相育孕而各稟陰陽成天下之亹亹者皆此陰陽之道也夫此陰陽之道之氣或幽潛於其身或淪匿於各體或變化居中而包囊萬物或懋施生殺而為道紀綱倘非乾坤二用紀綱妙道則道或幾乎息矣以無制有器用者空無與有為兩者何也太極之分有先天有後天何謂先天形而上者謂之道以有入無也何謂後天形而下者謂之器從無入有也老子曰無名天地之始有名萬物之母海蟾云從無入有皆如是從有入無能幾人推度坎離消息之功則後天者皆為器形滓質而有消息沒亡非若先天乃有久長之道可躋聖域也孔子曰先天而天弗違後天而奉天時世人惟順行後天之道故一生一死而輪轉不息聖人善逆用先天之道故致知格物正心修身乃長存而不泯數往者順知來者逆故易之道逆數也言不苟造者蓋諸子百家之書隨才述作工拙何居此為道之祖書不可妄置一語恐誤後人此所謂言不苟造也論不虛生者仙翁上法三聖準陰陽象日月况同類作此書為世梯筏此謂論不虛生也何謂引驗見效昔黃帝上升巢許高蹈老子化胡成佛淮南雞犬皆仙此皆引驗見效也何謂較度神明如日月合璧爽現於庚子曰神而明之存乎其人推類結字者如丹從月生水象坎卦日月為易首之成道此結字也原理為證者陰極而陽陽極而陰順行陰陽生人生物逆用陰陽必成金丹此原理也坎戊月精者北之正位為坎中有真土是為陽土女宿主事幽潛陽精戊為之門月轂之地藏無角兔內白外黑是為陰中之陽外雌而內雄也離已日光者南之正位為離中有真土是為陰土柳宿主事淪匿陰光已為之戶日輪之所藏三足烏內黑外白是為陽中之陰內雌而外雄也古人以日月為易字者是易即陰陽也然言陰陽則不見易言易則不見陰陽矣且萬物非土則不能芽孽而日月尤所以孕乎土也故東躔則經氏土西度則經胃土南行則經柳土北育則經女土日月得土則久其明土借日月以厚其德土之分王循環四季春生夏長土之功也秋斂冬閉土之力也所以四時各有王日長鎮中宮始終羅絡以就其功靑赤白黑雖各居於東西南北然皆秉於戊已二土共成其德以施神化也此章言陰陽分位各居凡所用者必藉於土非有龍虎鉛汞金水採結之語故前則言列陰陽配合之位後乃云各居一方其他解者不述仙翁本意無分條件紊亂互注使後之人觀此書者或言仙翁覼縷重言是不知妙語之有次序也日月懸象章第三易者象也懸象著明莫大乎日月窮神以知化陽往則陰來輻輳而輪轉出入更卷舒易有三百八十四爻據爻摘符符謂六十四卦晦至朔旦震來受符當斯之際天地媾其精日月相撢持雄陽播元施雌陰化黃包混沌相交接權輿樹根基經營養鄞鄂凝神以成軀衆夫蹈以出蠕動莫不由孔子曰變通莫大乎四時懸象著明莫大乎日月仙翁重以明之引而信之此書法象日月以喻陰陽日月麗乎天而有朔望對合陰陽在乎世而有順逆生成日乃純陽之氣謂之太陽月乃純陰之精謂之太陰周天三百六十五度餘四之一每晝夜天一周遭為一日太陽一日行一度行及三十度為一月太陰一日行十三度有奇月一周天謂之一月日行一度謂之一日何謂窮神以知化神之為物神莫神於天地化之為妙化莫化於陰陽天道左運一日一周遭行五十五萬餘里地在其氣之中如水上之浮板而不動太陽之神天地之元氣也其體全瑩萬物資其陽火赫赤之氣以生長成實其體之徑濶八百四十五里差餘其行不由黃赤道乃出入於黃道內外晝長在赤道北晝短在黃道南何云南北內外蓋北有紫微垣帝座居之故北曰內而南曰外其神有不可得而窮極者太陽之神也太陰之神天地之至精也其體全黑萬物資其陰水運化之功以孕産滋育其體之徑濶六百七十里有奇其行不由黃赤道其黃道與赤道如兩環相交相距二十四度月乃由中而行距黃道約六度其體雖黑映日即明緣督子以革象誨人用黑漆毬於簷下映日其毬受日之光遠射暗壁月之圓體比黑漆毬有日映處則有光日映不到則無光故常一邊光一邊暗遇望日月相對夜則月在天上日在地下所映之光全向人間一邊暗處全向天世所不見晦朔日月同經月在日之下月受日映一邊光處全向天一邊暗處全向地月離日二十五度人間乃見月吐微光離漸遠光漸多月離日九十餘度人見月光一半故謂之弦既望以後光漸少耳故月體本無圓缺在乎受日光之多少矣愚人或謂日月對望為地所隔彼豈知天之高遠而陰陽之氣有隔礙潛通之理然月中似瑕者即大地之影也日體大月體小日距天遠月距天又遠而月之化有不可盡泄者太陰之神也此謂窮神以知化也子為一陽之首至巳而極陽極則陰生午為一陰之首至亥而極陰極則陽生寒暑代謝溫涼平分陰極陽生陽往陰來比陰之附陽若輻之於輪輻輳而輪轉陰卷則陽舒易有三百八十四爻據爻摘符者謂一卦有六爻一爻有三符一日兩卦兩卦有三十六符陰陽相交不用一時之久不盡一爻之用猶一時有三符止用一符一符之行則一陽生於坤之下以成震震者一陽能伏二陰也故云震來受符當斯之際天地媾精萬物憑虛而受生日月撢持鳥兔相結而莫解陽雄而剛峙翠元而施化陰雌而闢化黃包以含滋杳冥混沌之中兩相交接權輿牝牡初媾始樹根基權輿者始初之義古人造衡自權始造車自輿始此言造化之初育也又權者暫也輿者穩也言暫時工用要最穩當而不僵踣也經營一氣以養鄞鄂凝布陽精以成形軀此章但言太極肇分之初陰陽順行之始而生人也生萬物也故曰衆夫蹈以出蠕動莫不由世人不知後天順行之道亦借朝屯暮蒙之喻亦有根基鄞鄂之比乃指為還丹鼎中造化非也聖人上觀章第四於是仲尼讚鴻蒙乾坤德洞虛稽古當元皇關雎建始初冠婚氣相紐元年乃芽滋聖人不虛生上觀顯天符天符有進退屈伸以應時故易統天心復卦建始萌長子繼父體因母立兆基消息應鍾律升降據斗樞三日出為爽震庚受西方八日兌受丁上弦平如繩十五乾體就盛滿甲東方蟾蜍與兔魄日月氣雙明蟾蜍視卦節兔者吐生光七八道已訖屈折低下降十六轉受統巽辛見平明艮直於丙南下弦二十三坤乙三十日東北喪其朋節盡相禪與繼體復生龍壬癸配甲乙乾坤括始終七八數十五九六亦相應四者合三十陽氣索滅藏八卦布列曜運移不失中元精眇難覩推度效符證居則觀其象準擬其形容立表以為範占候定吉凶發號順時令勿失爻動時上察河圖文下序地形流中稽於人心參合考三才動則循卦節靜則因彖辭乾坤用施行天下然後治一本云可得不愼乎非是翼曰易有太極是生兩儀是仲尼讚鴻濛也乾坤之德混沌虛妙元皇為盤古開闢之初是仲尼稽古也關睢者男女人倫之正夫婦冠婚之首仲尼定詩先夫婦者正陰陽無邪之道仲尼翼易先乾坤者明剛柔必配之理是繫辭曰易與天地凖故能彌綸天地之道仰以觀於天文俯以察於地理是知幽明之故原始返終故知死生之説何謂原始蓋順行陰陽之道以生人物故云冠婚氣相紐也是之謂知生也何謂返終能逆行先天之道超凡入聖故云元年乃芽滋是之謂知死也昔者子路問死子曰未知生焉知死聖人好問好察惜子路當時不就問生死之説以發露易之道使後世人知有順死逆生之理知有和順道德之義知有窮理盡性以至於命之道是以聖人之降世也仰觀俯察精審陰陽以陰為符以陽為命何謂上觀顯天符蓋陰氣在天地間曰天符陽氣在天地間曰天命陰氣在人身中曰火符陽氣在人身中曰性命若陰陽屈伸之時則符為進退之候符候凖乃不失時故易之道統乎天心天心乾之正位子為天心陽生之戶乾為陽物天符純陰乾陽初生於二陰之下為震震為長子復生於坤復者一陽伏五陰也坤為母故云因母立兆基也鍾律應斗樞者黃鍾之律在子斗樞之運建子皆應一陽始萌之時即於三日之晡月之微陽生於西南陽生於月之下比震故云震庚受西方八日上弦兌受丁火陽升至半其平如繩十五對望日西月東月兔盡吐其光陽滿卦體成乾十六平明巽見於辛陰符包陽使無奔逸二十三日陰符半褁光止下弦坤乙三十日月體全晦白盡黑純光向於天東北喪朋東北為艮箕水之鄉艮為鬼路即於人身癸滿經行喪損其氣節盡癸竭一陽復生故以壬癸而配甲乙如乾始復七八九六數終三十終則成坤真氣歸藏是知八卦乾坎居北艮震歸東巽離返南坤兌還西交布列曜運用推移不失於中中乃天心即太極中元精之物眇不可覩天生聖人推考度量以效為驗以符為證觀日月之象擬諸其形容若司天者立表測影以為格範占知時候察定吉凶若一發號必順時令準擬爻動則知陽生上察河圖明乾象陰陽之交會下序地形詳坤體金水之妙化中稽人心應時發號動循卦節復震從先靜因彖辭大哉乾元雲行雨施品物流形含弘光大柔順利貞天文既察地形已序人心又正則乾坤之門施陰陽之道使天地人物皆得自然之治矣此章引聖人稽古觀天之喻明日月之合體乾坤之用使世人辨陰陽識進退明造化擬形容應符節謹動靜如是而比一身之天地治矣非有龍虎鼎中抽添之語君臣御政章第五御政之首鼎新革故管括微密開舒布寶要道魁柄統化綱紐爻象內動吉凶外起五緯錯順應時感動四七乖戾誃離俯仰文昌統録詰責台輔百官有司各典所部日合五行精月受六律紀五六三十度度竟復更始原始要終存亡之緒或君驕佚亢滿違道或臣邪佞行不順軌弦望盈縮乖變凶咎執法刺譏詰過貽主辰極受正優遊任下明堂布政國無害道仙翁以修丹之難借喻御政則知亂民之難治凡修丹則知意馬之難拴繫舊染俗污咸與維新御政之首也是謂鼎新也懲忿窒欲見善則遷修身之本也是謂革故也若為政若修身先從自已至微至密者首當管括而究治之則為政而政成寶身而身修孔子曰為政以德譬如北辰居其所而衆星共之德之一事不但為政德乃百行之原修丹之士可無德乎且何謂德仁慈愛明誠上德之士也恭寬信敏惠入道之門也凡欲修丹當以惠敏為先惠則足以使人仙翁乃曰開舒布寶者外得民之歡心內寶已之真氣此為要道之魁柄若數布寶乃能統化其綱紐綱紐者執法之主善加統化則執法者不苦其法若爻象內動則吉凶外應亦猶五緯錯順吉凶應時感動誃離與此意同誃即改離猶移遷也言四七之星宿乖戾誃離悉皆俯仰文昌為太微主星即魁中戴筐六星號南極統星為人身朱雀之神録人長生之籍虛精之星乃三台之綱紀統録之星為三台之領袖在人身為明堂之主開化世人之德洞微隱光星是紫微輔弼即尊帝二星在人身為元武之神若人見之夀可千歲其餘百節萬神各典所部修丹一事緊關造化故比御政為難復以星宿喻身曰合五行精者子丑寅月日合五星於北卯辰巳月日合五星於西午未申月日合五星於南酉戍亥月日合五星於東堯時天心建子甲辰冬至日次虛鼠漢太初冬至日次牽牛唐太衍冬至日次東斗宋至今冬至日次南箕此謂歲差故太陽得火土益精光得金水愈炫彩月受六律紀者律陽而呂陰一五一六而合三十三十度周日月再會故云度竟復更始日月循環往來而有弦望晦朔世因弦望晦朔而有寒暑代謝人因寒暑代謝故有生老病死原其始則能長存要其終則能不亡君乃心也臣乃身也心即我也身即物也若我心驕亢或自滿溢或身物相競不順軌法則弦望乖變盈縮有凶咎致執法者刺譏詰過於其主矣辰極即前文昌星一曰南極辰極秉正而行優遊以任其下明堂即台輔勤布其善政使國無乖戾國亦身也身安氣和則不害道此章喻人之修身鍊丹亦猶人君之治國布政治國得其人行其政則天下平修身盡其心立其命則丹道成矣他本御政之首下無鼎新革故一句此書流傳已久後有不能曉其元言諸本多有差錯晦菴朱熹正數百字未能盡善非遇聖師難分石玉鍊已立基章第六內以養己安靜虛無原本隱明內照形軀閉塞其兌築固靈株三光陸沈溫養子珠視之不見近而易求黃中漸通理潤澤達肌膚初正則終修幹立末可持一者以掩蔽世人莫知之養已者終身鍊已也孔子曰君子安其身而後動易其心而後語定其交而後求君子修此三者故全也聖人患慮之深備練人之情實一動一語一求三者乃入聖之至理真養已之要言寶精裕氣養已也對境忘心鍊已也常靜常應鍊已也積德就功鍊已也苦行其事云鍊熟行其事云鍊修丹之士必先鍊己苦行忍辱庶得入室之時六根大定方使純熟忘無可忘乃能就事是以大學之道在明明德在知人在止於至善既明德又知人止於至善正合鍊己况知止而后能定定而后能靜靜而后能安安而后能慮慮而后能得此正合安靜虛無之要虛無者非空虛全無之謂仙師曰先天一氣自虛無中來是安靜虛無之至也原本者從自己生身處求之則知真精真氣為我身之本隱明者世人多為聰明所役耗其神氣大修行人黜聰明屏智慧內照形外忘我塞兌而築固靈株收視而溫養子珠如是方得黃中通理肌膚潤澤初正乃煉已之事終修乃臨爐之事幹立盡煉已之道末持下入室之功一者已也戊也會此一字是參到伯陽心地上孔子曰吾道一以貫之老子謂得一萬事畢釋氏云萬法歸一故天一生水者要知此水從一中而生一中者坎之中爻也一者掩則聚精會神一者蔽則分靈布氣人能知一則宇宙在乎手也人若得一則萬化生乎身也一之為妙非師莫明故云一者以掩蔽世人莫知之亦云莫之知亦妙仙翁丹法要先築固靈株者煉已而凝神也溫養子株者積精而纍氣也煉已功純方可以煉還丹世人既不知煉已事大又妄行半時得藥之功希冀功成愚之甚也故淸靜經云內觀其心外觀其形遠觀其物惟見於空空無所空所空既無無無亦無無無既無湛然常寂寂無所寂語到這裡常人看來豈非大休歇大解脫時也緣何一接欲豈能生欲既不生即是真靜真靜方能應物仔細看來行到真靜應物處方是初學底事若論修丹尚未夢見今之常人施一齋造一塔或三峰採戰或枯坐誦經或無為或禱祀凡此等以為向善則可若曰修道實未得其門而入也故養已之功欠一此不可是洞賓云七返還丹在人先須煉已待時泥丸云言語不通非眷屬工夫不到不方圓紫陽云若要修成九轉先須煉已持心聖聖相傳可不諦受太虛真人得黃房公旨依教往武夷即謀就乃事初行鍊已功每障魔百至太虛卓然曰束送妖魔精斬馘六鬼鋒旋定息而坐此念才舉愛根斬然後學觀此煉已一事更宜三思此章只言養已無金虎鼎室之説若以三光即陽火陰符金胎尤非也明雨知竅章第七上德無為不以察求下德為之其用不休上閉則稱有下閉則稱無無者以奉上上有神德居此兩孔穴法金氣亦相胥知白守黑神明自來白者金精黑者水基水者道樞其數名一陰陽之始元含黃芽五金之主北斗河車故鉛外黑內懷金華被褐懷玉外為狂夫金為水母母隱子胎水為金子子藏母胞真人至妙若有若無倣佛太淵乍沉乍浮退而分布各守境隅採之類白造之則朱煉為表衛白裏真居方圓徑寸混而相拘先天地生巍巍尊高旁有垣闕狀似蓬壺環匝關閉四通踟蹰守禦密固閼絶姦邪曲閣相通以戒不虞可以無思難以愁勞神氣滿室莫之能留守之者昌失之者亡動靜休息常與人俱上德者體全德之人也無不為之士也男子當二八之年真精全而欲泄全德之人則能保愛而渾無虧又遇明師授以無為修攝之道以永其夀是謂無不為之士是謂上德之全人也是即聖人行無為之化是即大人成無為之功也下德者竊造化之人也盜萬物之士也夫一切人年甫二八真精未泄謂之純乾逮夫情欲一動乾之中爻走入坤宮乾不能純心虛為離由是而後曰夜漏泄存而有者復幾何哉惟至人者不待其極乃行聖人復全之道以仙其身是謂下德之士是竊造化之人也是即聖人率性之道是即神人有為之功也上德者無為而無不為也得太極全體成後天之功是曰不以察求下德者有為而有以為也奪造化之用成先天之功是曰其用不休仙師云始於有作無人見及至無為衆始知但見無為為要妙孰知有作是根基斯言道盡金丹之事非易也至人不得已而行之老子故曰夫佳兵不祥之器不得已而用之蓋謂此也上閉則稱有上閉為坤坤之為德其靜也翕有乃坎中之戊土內有先天真一之氣下閉則稱無下閉為乾乾之為德其靜也專無乃離中之已土中藏後天自然之汞到此雙明兩用之竅經曰常無欲以觀其妙常有欲以觀其竅此兩者同出而異名同謂之元元之又元衆妙之門聖人無兩心其元言妙語未常高遠萬世莫能測其端倪必要師授之黃帝上聖若不師廣成子豈能自明此道耶只如此竅聖人無可奈何形容直到了處伏羲畫卦首以乾坤兩象以定此竅文王不隱重而明之孔子翼出乾直坤闢之義老子乃云元牝之門是謂天地根釋迦喻正法眼藏涅槃妙心此皆直指而可見矣上士或能自明此竅其中功用非師莫明無者以奉上無言己性有即戊情若已之性能奉戊之情則情之義肯戀性之仁矣上有神德居蓋先天一氣自虛無中來者神之德也仙翁重指日此兩孔穴法金氣亦相胥兩句為參同契之關鍵萬世之下慧饒顏閔不能自通雲房翁曰生我之門死我戶幾個醒醒幾個悟夜來鐵漢細思量長生不死由人做只那生我之門死我戶豈非兩孔穴也如前止陳乾坤日月造化之理至此才定元關便指金水二物作書次第不泛若此修丹之士既明此竅且參金氣為何物相胥為何用深達洞曉方可鍊丹知白守黑知其金之精純白而無污是知白也守其黑之基待時而生水是守黑也水之初生名為先天以其至真號曰神明白黑相符金水汛旺一遇已土制水淘金金水滿爐故曰神明自來何謂水者道樞其數名一蓋水從天一而生故為陰陽之始元含黃芽者翼曰陰雖有美含之以從王事即太元為水黃芽為丹水中有丹因喻之曰元含黃芽黑鉛之中內藴白金河車之中內藏黃芽亦猶士而懷玉衣若被褐則害不至金為水母蓋兌金生坎水而坎之中爻屬金故云母隱子胎水為金子壬癸之水自西而生兌之中爻乃屬於坎故云子藏母胞真人至妙者真人即乾之體乾之為物至神至妙其為形也或有或無太淵即坤之象坤之為物能沉能浮其為形也莫見莫聞故乾能變化坤德資生既已化生乾坤分布各守其境採之類白者是鉛中有銀而白造為內丹則朱獨鍊則成胡粉其採外丹而鍊亦類乎是然外丹者常須表衛外覩如朱之紅潤內使不失其真白也方圓徑寸混而相拘者蓋杳冥之中有物則太極未分之時為先天地內藴先天真一之氣居乎太極之前乃象帝之先故云巍巍尊高也旁有垣闕狀似蓬壺乾之為象亦似垣闕亦似蓬壺法象形容一身一己如上皆指鼎器而言環匝關閉即表衛也四通踟蹰密外護也守禦密固者不可須臾離也可離非道也閼絶姦邪者其出入以法度限內外使知懼令白裏真居也曲閣相通者必置壇墠精嚴以戒不虞之患仙翁慈悲自環匝關閉而下厯厯指教恐有不虞之害又須無思無慮不可憂愁勞役故云可以無思難以愁勞俾神氣滿室而不致虧損故云守之者昌失之者亡若稍不固便致傾喪是以動靜休息頃刻不敢放恣而忽慢則金鼎之氣彼我堅固而互相調伏故云常與人俱此章直指兩竅之體發明金水之用修行之人看誦參同契到此方知入頭一著便是難能之事然下德之器修有為之道其功全資於鍊已也鍊已稍欠神明不來明辨邪正章第八是非厯臟法內觀有所思履行步斗宿六甲以日辰陰道厭九一濁亂弄元胞食氣鳴腸胃吐正吸外邪晝夜不卧寐晦朔未嘗休身體日疲倦恍惚狀若癡百脈鼎沸馳不得淸澄居纍土立壇宇朝暮敬祭祀鬼神見形象夢寐感慨之心歡意喜悅自謂必延期遽以夭命死腐露其形骸舉措輒有違悖逆失樞機諸術甚衆多千條有萬餘前郤違黃老曲折戾九都明者省厥旨曠然知所由勤而行之日夜不休伏食三載輕舉遠遊跨火不焦入水不濡能存能亡長樂無憂道成德就潛伏俟時太乙乃召移居中洲功滿上升膺籙受圖做修行人須明大道之正倘非陰陽配合坎離施化外此皆為旁門左道如內視五臟存想呬呵外履斗宿步罡揑訣或習房中之術御女三峰或行九一之道劍法五事對境接氣濁亂元胞是皆穢行乃旁門之最下者又如吐正吸邪忍飢食氣或論年打坐晝夜不眠或立壇祭神鬼物見象此又旁門之亂道者是使精神恍惚百脈沸馳心意日歡夢寐夜作千蹊百徑然總無功既違黃帝老子之教言不參真師陰陽之同類曲折而招九都之戾何由而結一黍之珠本冀延年故因促夀若有明達之士復遇真師之言曠然行之愈勤不怠夙夜不休以求藥專心伏食而密行三載一任遠遊九年足可輕舉積纍一紀水火不傷居洞府以無憂宴瑤池而長樂己成道則潛伏更積德以俟時三天有名太乙乃召俾司仙職移居中洲若又功高飛身三境加封進級膺籙受圖如張葛旌陽浮丘鍾呂列聖己然後聖宜遵而行之也此章仙翁力言一迷一明一邪一正邪則九都譴戾正則行滿飛升理之必然無可積慮至於下手工夫次第在後龍虎兩弦章第九火記不虛作演易以明之偃月法爐鼎白虎為熬樞汞日為流珠青龍與之俱舉東以合西魂魄自相拘上弦兌數八下弦艮亦八兩弦合其精乾坤體乃成二八應一斤易道正不傾仙翁鋪設到此方言鼎爐龍虎弦氣曰偃月爐曰白虎曰上弦曰兌曰魄屬於西也彼也玉池也曰汞日曰流珠曰青龍曰下弦曰艮曰魂屬於東也我也金鼎也偃月爐者即太乙神爐是之謂陰爐也以其偃仰似月初生之象白虎乃西方兌宮之物天地初分元屬於彼其虎之威叩之則應含弘光大品物資生雖能傷人殺人郤藴大乘氣象文王重易曰履虎尾不嘻人亨又曰履道坦坦幽人貞吉孔子曰説而應乎乾又曰素履之往獨行願也修丹之士知畏此虎要先降而伏之既能伏之則可為熬之樞而不嘻人也離為日為汞中有朱砂名曰流珠青龍乃東方震宮之物劫運既周元屬於我此龍之勢威能變化感而遂通雲行雨施品物流形乾之九二見龍在田利見大人子曰龍德而正中也世人不悟此龍生生之功每被其害若人悟而畏之調而降之則能驅駕而用之矣舉東以合西則嘉會而合禮也兌艮數各八流戊而就已也魂魄自相拘金木不間隔也兩弦合精乾坤體成易道不傾者必二八相停而成一斤也一斤指圓成之數數乃積小以成大故十粉曰丸一丸如黍一黍餘曰刀圭六十四黍曰一圭十黍為纍十纍為銖兩銖四纍為錢十錢為兩八銖為錙説文六銖為錙監韻八兩為錙二者皆偽三錙為兩是二十四銖也十六兩為一斤斤有三百八十四銖斤四兩為鋝也古人分銖以應卦爻之數金返歸性章第十金入於猛火色不奪精光自開闢以來日月不虧明金不失其重日月形如常金本從月生朔旦日受符金返歸其母月晦日相包隱藏其匡廓沉淪於洞虛金復其故性威光鼎乃熺仙翁無一泛言至此方指金之為用非金之功則不成丹故云金丹郤非世上金玉之金非從土石中出者乃天地造化五行顚倒之妙自乾坤大化窟中而産者此金是也今之盲師但説金丹便自慌忙不知所為何者口説修行又不得聞金丹之名亦不究竟參同契中之語乃誑於世豈知仙翁厯厯指示此金神化之用有等愚人每覩是書不察陰陽真金體用乃猜為燒煉爐火等事惜哉昧哉若不與世露些消息則萬世之下此書愈高愈遠人既不能窺其畔岸遂皆棄而不觀抑何從而求修行之旨耶上根利器要知此金在鴻濛混沌之先太極未判之始元屬於乾故謂之乾金大劫欲交則謀報混沌之德者至是以乾初交坤此金顚蹶蹄驟奔入坤宮謂之坤中金坤得此金內實而為坎坤之三爻本皆中虛號曰坤土既得此金以實其中而成坎象坎之正位居於北方癸水之地是坎為水金藏其中故謂之水中金夫水中之金為先天之寶不能久居於後天之坎因化為兌兌或躍於北方之坎戶占居西天之酉方則此金日生夜長酉之正位屬兌是以此金主行丹道於兌之中故謂之兌金也鍊丹之士尋微索賾原始要終格物致知探其源流審其根苗若鍊金丹必求此金若求此金不求於乾不求於坤不求於坎專求於兌兌之為物乃坤月同類是云同類易施功非類難為巧兌之為妙代坤之道故鍊金丹除此兌金餘皆旁門不能成道黃帝老子從古聖仙皆用此金方能了道文王重巽九五先庚三日後庚三日仲尼翼巽兌柔皆順乎剛君子以申命行事夫庚金也經云三日月出庚是也且釋迦假此金以成佛故號金仙蓋兌中之金與天上太陰同體而生明同時而生丹天上之月名曰太陰緣此兌金同其功用遂亦名之曰少陰又云陰中之金天上太陰其功接太陽之輝光以成歲時兌之少陰其道傳續大千世界生化人物仙翁參透前聖知此金之根源推此金之妙化闡出此金之神變也彼世間金能與天地同久入火其色愈精久鍊不失其重况此兌金是乾坤大化爐中之所産也月之光有虧盈兌之金有流轉故云形如常朔旦日月合璧月受日符現一陽之光於庚申之位此上天之太陰也而此兌金每應月之朔亦初三日生始陽之丹於混沌之位此人間之少陰也故云金本從月生朔旦日受符何謂金返歸其母蓋金之舍曰兌兌之母曰坤兌不能久含其金金亦因時而發用坤之翼曰含章可貞以時發也聖人之心妙在於此金既發用兌返母而包歸坤猶月晦而日相包何也晦日朔旦月之全體隱藏匡廓為日所覆一日二日三日運行其度輝光再吐也又如金返歸母金之真精沉淪洞虛為世之用一生二二生三劫運再交金將復産也若此金復産必復其故性何也性為乾之用乾之直也寄金於坤坤寄於坎坎寄於兌兌金舒情復其故性乃以此金還於乾宮乾之金鼎復得其種鍊成金丹是以此丹號金液還丹鼎號威光金鼎是云威光鼎乃熺熺亦作嘉亦作嘻三字通釋火熾熱盛之義此金丹書日月星宿天龍真宰造化神靈悉皆擁護敬之畏之二土全功章第十一子午數合三戊己號稱五三五既和諧八石正綱紀呼吸相含育佇息為夫婦黃土金之父流珠水之子水以土為鬼土鎮水不起朱雀為火精執平調勝負水盛火消滅俱死歸厚土三性既合會本性共宗祖巨勝尚延年還丹可入口金性不敗朽故為萬物寶術土伏食之夀命得長久士遊於四季守界定規矩金砂入五內霧散若風雨薰蒸達四肢顏色悅澤好髮白皆變黑齒落生舊所老翁復丁壯耆嫗成姹女改形免世厄號之曰真人子居北北乃坎之正位其數一午居南南乃離之正位其數二坎中有土曰戊其數五離中有土曰已其數五戊專坎之門掌先天真一之氣已直離之戶積後天至真之汞若求先天之氣必通戊土而後得之若用後天之汞必伏己土而後和之子午既歡而諧戊土既和而合二五之精妙合而凝流戊就己鼎中得類兩土相結因名曰圭八石為坤乾坤為衆石之父母非坤則不得兌之綱紀消息子午相呼吸戊己相含育鉛汞相交結而為夫婦矣黃土者戊土也戊土能生兌中金故為金之父流珠者木汞也鉛水能資木中之汞故流珠乃水之子鉛水以戊土為鬼戊土一鎮中宮水不妄流於外朱雀者離中之物是為火精心平氣和而脈停可使調其勝負矣水尅火火尅金金尅木四者俱消其功歸於厚土厚土者己土也三性者戊金水也坎之門曰戊坎之中爻曰兌金金生太乙之水金既生水戊又制之是三性合會也木性即己土也離中之戶曰己戊金水三者合木性之己木乃徐徐而尅之總變而為大丹故曰本性共宗祖巨勝者胡麻也胡麻若作飯常食之能延年况還丹是金水戊己鍊成為天地間之至寶修行術士伏而食之夀與日月同其長久伏者伏先天之氣食者食黍米之丹後人誤作服字是不知伏之為妙也故仙師云伏氣不服氣服氣須伏氣服氣不長生長生須伏氣只一伏字逆用化機土遊於四季四季者辰戌丑未也土各有王日每季月王十八日謂之遊惟夏季火生土土德勝王金畏火故入秋屬申月古人以水土俱生申者土因夏火而生水到三垣而産水漸制火土乃生金故入秋初土德先王九日而生庚金至戌止有九日而分王也守界定規矩者東方有氐土能守青龍之界西方有胃土能規白虎之威南有柳土能矩離火之戶北有女土能定坎水之門是使制伏丹砂真金之氣還入五內其丹初至氣散如霧潤澤若雨丹氣薰蒸遍達四肢神氣既全顏色悅好齒生髮黑返老還童改其枯瘁之形永免世間之厄形神俱妙紫霞真人此章言欲下手鍊丹先和戊己二土然後可採金水而成丹也同類合體章第十二胡粉投火中色壞還為鉛冰雪得溫湯解釋成太元金以砂為主秉和於水銀變化由其真終始自相因欲作伏食仙宜以同類者植禾當以穀覆雞用其卵以類輔自然物成易陶冶魚目豈為珠蓬蒿不成檟類同者相從事乖不成寶燕雀不生鳳狐兔不乳馬水流不炎上火動不潤下世間多學士高妙負良材邂逅不遭遇耗火亡資財據按依文説妄以意為之端緒無因緣度量失操持搗治羌石膽雲母及礬礠硫黃燒豫章泥汞相鍊治鼓下五石銅以之為輔樞雜性不同類安肯合體居千舉必萬敗欲黠反成癡稚年至白首中道生狐疑背道守迷路出正入邪蹊管窺不廣見難以揆方來胡粉黑鉛鍊就也得火則還本性冰雪寒水結成也遇熱則歸本源黃金入水銀而變白得火則回其赤色世人皆嗜欲而亂性全性而可以長生何謂金以砂為主何謂秉和於水銀修行之人明其造化洞達陰陽欲鍊金丹先積離己之朱砂以和玉池之水銀郤用坎中之水以濟離中之火水火既濟金砂合形變化由同類之真終始因雄雌為主所謂欲作伏食仙宜以同類者實為諦當如植禾必種穀覆雞須用卯欲作仙佛不得同類雖入闡百處打坐千年終落空亡若也不參同類行諸旁門或房中御女或三峯採戰此皆邪徑猶認魚目為珠蓬蒿為檟豈知變化由其真乎燕雀飛禽也不能生鳳狐免走獸也安能乳馬皆非其類水之為化不能炎上火之為功不能潤下蓋以陰陽往來必秉自然之道仙翁教人以求明師必參同類必配陰陽方可言丹我紫瓊翁初受太虛真人入室語首問參同契為明易耶為行易耶太虛曰易只陰陽兩件物事能明能行方為聖人故易曰西南得朋乃與類行參同契日類同者相從事乖不成寶先明之後行之聖人也豈謂後人或負高妙之良材不求真師依按古文妄意度量或以韶之石膽鍊金或用辰之砂銀燒丹搗治五金鋾鍊八石以三黃為同類淨赤銅為輔樞其石與金非我同類安肯合我之氣而居我之身乎昔九江張相鍊丹服食洞賓憫其好道心切化一術士訪而救之張自負恃服丹己久必可飛升略不加禮洞賓頓去但見座間有詩云可惜九江張尚書服藥失明神氣枯不思還丹本無質翻餌金石何太愚後果雙目不見而終此輩皆負良才執滯不回甘受盲師誤將金石指為同類耗亡資財服食燒煉或至於終而不敢黜如彼等人以管窺天豈知天地間而有真仙聖師耶世人狃於慣常不自卑下訪問又不拔萃廣參耳隘目低烏足聽觀高遠之事耶郤乃昻藏稱大丈夫是皆空負高妙之良材失於自恃自滿耳三聖前識章第十三若夫至聖不過伏羲始畫八卦效法天地文王帝之宗結體演爻辭夫子庶聖雄十翼以輔之三君天所挺迭興更御時優劣有步驟功德不相殊制作有所踵推度審分銖有形易忖量無兆難慮謀作事令可法為世定詩書素無前識資因師覺悟之皓若褰帷帳瞋目登高臺火記六百篇所趣等不殊文字鄭重説世人不熟思尋度其源流幽明本共居竊為賢者談曷敢輕為書若遂結舌瘖絶道獲罪誅寫情著竹帛又恐泄天符猶豫增嘆息俯仰綴斯愚陶冶有法度未可悉陳敷略述其綱紀枝條見扶疏八章言前郤違黃老者黃帝老子二大聖至此詳明三聖人之立言垂訓其尊崇前聖後聖之意回視後之末學總無所知妄誕相高開口謗毁者其罪當何如哉經曰若夫至聖不過伏羲伏羲亦作庖羲亦作伏戲孔子翼曰古者庖羲氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與天地之宜近取諸身遠取諸物於是始畫八卦以通神明之德以類萬物之情文王結體演爻辭示西南得朋之妙何謂十翼以輔之易之書也伏羲畫卦文王繇辭周公爻辭共為二篇曰正經仲尼於正經之後翼以十篇曰上彖傳下彖傳大象傳小象傅繫辭傳上繫辭傳下文言傳説卦傳上中下十篇是為十翼本釋易乃不曰釋而曰翼者以輔易之道也聖人上祖下法經自為經翼自為翼欲使後之學者知聖人不敢先於前聖亦不紊亂正經傳自商瞿至於費孟梁丘費之言曰彖辭所以解經乃分二翼於各卦之下費之易行聖經亂矣費直不明聖人不先不紊之意若聖經可紊則仲尼早分而釋之矣費傳至鄭康成鄭主費也鄭之言曰文言傳者所以釋乾坤二卦乃移於乾坤二卦之後至於王弼王弼主費鄭弼之言曰象傳所以釋爻乃移於各爻辭之後各添象曰彖曰字數百年間已三紊亂既亂正經又失翼傳費直作俑鄭王和之今之易非周易乃王弼之易也先賢欲復周易之翼多矣只如宋李燾朝説之歐陽修諸公皆嘗校定周易以為古易燾曰周易十二篇始紊於費鄭大亂於王弼乃復校定名曰古易板於州學朝説之再定古易正經二篇十翼十篇已亡説卦二篇歐陽修曰秦火易之正經以卜筮存是則十翼之書散在人間漢文帝廣求文字十翼所存惟彖象繫辭文言耳後至漢宣帝時河上女子掘塜得易全書上之內説卦中下二篇污壞不可復識如是則十翼果亡二翼後人以序卦雜卦足十翼者非也其辭膚淺後之儒者惟相附和獨程氏有卓然之見其遺書曰序卦非易之藴此不合道後橫渠以大匠一斧辨之更非是惟程氏知亡二篇也朱震曰獨乾一卦是周易之本文弼不敢紊朱熹曰周易上下兩篇經則伏羲之畫文王周公之辭并孔子所作之傳十篇凡十二篇中間頗為諸儒所亂今悉整而正之定注為經二卷傳十卷以復孔氏之舊自熹到今已二百年竟不復舊者其有以夫易非十翼則易之道何以明言辭何以通變動何以識制器何以象為道而不通言辭則不得情性之感為道而不知變動則不得金水之化為道而不工制器則不得鼎爐之用為道而不達吉凶則不得逆順之理翼曰易有聖人之道四焉者此也是以君子將有為也將有行也問焉而以言其受命也如響無有遠近幽深遂知來物夫幽深乃恍惚杳冥之謂君子有為有行必於恍惚杳冥之中而遂知來物非天下之至精其孰能與於此仙翁謂十翼以輔之斯言盡矣聖人之用功均沾後世但恐學者無大福德無大智慧不足承當千般蔽阻無由見聞三聖迭興制作推度萬世師法伏惟至道天生聖哲奚有自悟必資師授縱負聰明謀慮忖度如有所障若有仁賢研心究竟忽得師旨心胸豁然猶如室中褰去帷帳分明洞達一似瞑中上登高臺何所不見人不求師奚自覺悟倘有所師先以參同契一書辨之若句句能明章章洞曉方是真正苟有一句懡㦬含糊便難信受若除此書謂別有途可成道者此大誑人何以故此書文王周公孔子祖述伏羲者也故仙翁曰夫子庶聖雄萬世之下孰能超乎孔子也哉且黃帝陰符三百老子道德五千符合不差惟明此道是以老祖天師葛許浮丘諸仙皆從此入又如紫陽悟真篇緣督子金丹難問等書皆祖參同也參之佛典道經俱契於此若有人曰某師誰氏又復師誰其説如流問其參同多所不曉此皆地獄種子反謂至道不在文書誑妄盲引孰知此書參勘真實方可下手况乎火記六百時節爻符密言妙語從首至尾鄭重而説人不熟思求其源流以達幽明共居之故此書為賢者談曷肯輕述果若結舌道惡乎傳盡露竹帛又泄天符猶豫增嘆息者猶乃獸名此獸性多疑居山聞有聲則豫上樹下上非一故不能自決者名之曰猶豫仙翁自説趦趄涉川畏鄰自增咨嘆俯仰再三綴撰斯文也然陶冶後來有隱露法度其口訣未可悉陳但述綱紀略見枝條耳金丹刀圭章第十四以金為隄防水入乃優遊金計有十五水數亦如之臨爐定銖兩五分水有餘二者以為真金重如本初其三遂不入火二與之俱三物相含受變化狀若神下有太陽氣伏蒸須臾間先液而後凝號曰黃輿焉歲月將欲訖毁性傷夀年形體如灰土狀若明窗塵搗治并合之持入赤色門固塞其際會務令致完堅炎火張於下晝夜聲正勤始文使可修終竟武乃陳候視加謹愼審察調寒溫周旋十二節節盡更須親氣索命將絶休死亡魄魂色轉更為紫赫然成還丹粉提以一丸刀圭最為神仙翁鋪敘到此方言入室臨爐下手結丹以入鼎也上根者當明是書最有次第而不泛參同一書此章大有肯綮非此一章之詳後人如何下手修丹之流未遇師旨不知是書隱而且奧觀至此章渾如嚼蠟無入頭處只得猜為五金八石煆煉之事到底無功反怨聖師謾語誠為可憐今略泄露永釋後疑以金為隄防者大修行人參鍊九還金丹須明此金乃西方兌中之金也先辦真心求彼兌金立置壇墠常加謹護隄防固濟以待此金之生水也所生之水尤當推度而明辨之要知此水是先天之水耶是後天之水耶若是後天則水溷濁不可以鍊還丹若是先天之水又待其水之淸而用之也詩曰涇淸渭濁蓋涇水淸而渭水濁也修丹者待其涇水之淸優遊防間不可撓動是云水入乃優遊此水之淸中有真金周興嗣曰金生麗水淸之至也且要知其斤兩輕重而後用之蓋此兌金必約十五兩重者借近一斤之準則是云金計有十五也金重到十五兩則能生麗水矣何謂水數亦如之非言水亦十五兩要水與金相稱如十五兩之金必能生多少之水故曰如之所以仙翁叮嚀臨爐方定其銖兩若十五兩之金已生到五分之水則水過餘而不可用是云五分水有餘若兌金初生水到二分時乃真可用是云二者以為真即此二分之水必約十五兩之金是云金重如本初若水已到三分者亦不堪用是云其三遂不入若金水之數及時相等急以二分之火而合之是云火二與之俱金水火既以相合則火受金氣復得水制結成還丹乃能變化而狀若神矣下手臨爐之工莫此為要是以聖人年中取月而置金月中測日而聽潮日中擇時而應爻時中定火而行符何謂行符古聖先賢以鍊金丹為一大件事也推度時節立攢簇法以一年七十二候簇於一日以三百六十爻攢於一月以三十六符計一晝夜分俵十二時中是一時有六候比之求丹止用二候之久一時有一爻比之求丹不要半爻之頃一時有三符比之求丹止用一符之速所謂單符單決者此也所以黃帝言陰符者此也故曰人知其神而神不知不神之所以神者此也修丹仙子於此一符之頃簇三千六百之正氣逆納胎中當斯之時奪天地之造化竊日月之精華地軸形心天關在手交龍虎兩弦之氣搗金水一體之真龜蛇盤結於丹爐烏免會行於黃道黑白交映剛柔迭興玉爐儲祥紫華映日熒惑守於西極朱雀炎於空中促水運金催火入鼎伏蒸以太陽之氣結號黃輿之丹也夫初鍊金水之時隄防以歲月而計至於合丹之際止用一符之工夫久則毁性而傷丹一虧則傷夀年矣是云歲月將欲訖毁性傷夀年修丹一事本為延夀登真若差一髮反傷夀矣故仙翁誨後學必要愼密明窗塵者比丹之至微也搗治者陰陽之交鍊也持入者保而持之而收入也赤色門乃乾之戶丹從乾之戶而歸神室固塞者閉息也際會者九竅也皆要堅完而無所失炎火張於下晝夜聲正勤者蓋陽丹之初到其中有信乍得離中之火晝夜周流一身百節萬神悉皆聽命正宜勤勤內守使聲寂而意和氣勻而脈住丹始凝結始文使可修者鍊丹之始用文火而修之其首尾則皆武火首用武火以鍊己終用武火以溫養故鼎器歌曰首尾武中間文是也候視加謹愼者不可自取疏慢泥丸有云工夫不到不方圓是也審察調寒溫者勿為人物所瞞紫陽翁曰調停火候托陰陽是也周旋以十二節終而復始直待添汞抽鉛鉛將盡汞亦乾七魄己死魂亦變是氣索命將絶休死亡魂魄也景象至此其色轉為紫金赫赤之還丹也粉提以一丸刀圭最為神者其小如一提之粉其小如一丸之藥黍大曰丸其輕如刀圭之七言至微也而其神妙有不可述也此章備言下手之功然細微元旨必師口傳孰能依文而成事哉先賢朱文公欲聞至道不得師傳酷好此書逮衰病中答侍郎袁公書曰參同之書本不為明易乃姑借此納甲之法以寓其行持進退之候文公該博如此為無師指想為納甲之法惡知此書直欲明周易之道故曰周易參同契况丹道行持進退之候並不用納甲之法也又書云近者道間不挾他書遂得熟玩參同粗能曉其文義蓋向來雖屢看率以無味棄去今乃始識頭緒然未得其作料孔穴夫元言密旨不可思議文公屢以無味棄去盲師郤要猜量又云異時每欲學之不得其傳無下手處則聖賢非師慧同孔孟奚自會耶今人自滿自足妄猜妄為若視前賢其罪多矣使熹得師指授大明聖人易道必不固執為卜筮之書也水火情性章第十五推演五行數較約而不繁舉水以激火奄然滅光明日月相薄蝕常在朔望間水盛坎侵陽火衰離晝昏陰陽相飲食交感道自然名者以定情字者以性言金來歸性初乃得稱還丹吾不敢虛説倣效聖人文古記題龍虎黃帝美金華淮南鍊秋石玉陽加黃芽賢者能持行不肖母與俱古今道由一對談吐所謀學者加勉力留念深思惟至要言甚露昭昭不我欺五行數者金木水火土推而為三五一之數如鍊金丹則以鉛汞銀砂土為五行而配合陰陽故水能滅火者謂陰能消陽日月薄蝕必在朔望陰陽二者盛衰相侵若陰陽和兩相飲食則自然有交感之道矣金與水同名曰情木與火同字曰性情居西北性主東南東南曰我西北曰彼金水之情自然外來而尅木火木火之性乃內還而結金丹是之謂金來歸性初乃得稱還丹是此二句為參同之骨髓也吾不敢虛説倣效聖人文者仙翁得聖人之的旨復獲古文龍虎經依法修煉而丹成乃撰此書以訓於後因厯敘黃帝之丹成曰金華淮南丹成曰秋石玉陽丹成曰黃芽丹成沖舉各立一名無非是此還丹也無非是先天一氣也無非同類之物也後人聞金華即猜為五金聞黃芽即猜為八石聞秋石即猜為便溺豈知古聖先賢方便立名所煉之丹奚出陰陽之外而別有路耶此道惟聖人為能勤行自古迄今一道而已三教大聖必須同類方可施功故云古今道由一對談吐所謀除此一途更無他術後之來者勉力深思求師指示則知是書昭昭盡露不我欺矣上陽子曰參同契三篇體用不雜功妙非常參者參天地造化之體同者資同類生成之用契者合造化生成之功上篇敘煉丹之本末中篇列細微之密旨下篇補遺脫之法象上篇與龍虎上經表裏義合世疑龍虎經必後人祖參同契上篇述以為經亦必有上中下三經也若無中下經則何以謂之上經聖人之心衆人豈識蓋上經者首經之義此固非凡可測又况書中有古記題龍虎之句以是明之則上古之文何疑故云金碧古文真人彭曉序謂仙翁不知師授誰氏得古文龍虎經盡獲妙旨乃約周易撰參同契三篇又云未盡纎微復作補塞遺脫一篇繼演丹經之元奧蓋仙翁初授真人陰長生之旨後復師徐從事由是備悉元微仙傳載詳真一又云書成密授靑州徐從事徐乃隱名而注之是則源流真實奚辨此書之注何啻百餘惟彭曉王道為優如曉得師授受觀其明鏡圖參同序亦已詳明而所注此書尚自碎雜故有畎澮殊流妍媸互起之語王道所釋尤為曠涸今詳龍虎經言雖高古不若參同契之明且決也其語幽元隱妙非得聖師叮嚀下手之的孰敢擬議如金來歸性初乃得稱還丹之下便接吾不敢虛説倣效聖人文則知古聖大賢非有所師寧敢虛説耶非師豈成是書也非師怎合造化也留此書於世者聖心道眼也天梯河筏也修行人仰賴也世無此書則皆趨旁門邪徑使盲師俗子架空揑怪相牽引動挽入地獄爾世非此書則天地之間無修行之旨無聖人之道也己欲成天下之舋舋者其何以哉留念深思惟仙翁其天矣大凡注書注者釋也其書隱奧難見解釋以曉後來故必得一書之本意必超前人之心地明徹洞達所注過於所作之書方可注釋否則彼處又不詳此處又不解返誤郤後人智慧低隘了方來耳目莫謂後之來者不如今也倘天生聖哲欲正救之則被其濁亂轉不得分其淸歸其正矣其它經書尚可如此書者伯陽面拜陰徐二真人至道之正其高製雄辭幽藏奧旨一字不苟况以金丹之法之妙鼎器之穴之用何啻百件伯陽止以金來歸性初一語皆盡宋儒未達不肯明周易之道總看為卜筮之書暗藏郤羲文周孔神聖之心黯郤乾坤順逆造化之道枉屈伯陽踵製元言之諦今若不曉露些孔竅則四聖人之心萬世莫伸大易之道萬世莫明豈知至要之言甚露昭昭不我欺之切切也中卷陰陽精氣章第十六乾坤剛柔配合相包陽秉陰受雄雌相須須以造化精氣乃舒坎離冠首光曜垂敷元冥難測不可畫圖聖人揆度參序元基四者混沌徑入虛無六十卦周張布為輿龍馬就駕明君御時和則隨從路平不邪邪道險阻傾危國家上篇十五章煉丹次第首尾已明此篇重述細微逐章條列乃九還大丹之合用後學之士必須深造洞曉不可依違苟且恐差毫髮則不成丹上陽子分此中篇為十五章者列其十五事也此章獨明陰陽精氣四者何謂乾坤剛柔孔子翼曰乾陽物也坤陰物也陰陽合得而剛柔有體以體天地之機以通神明之德故夫乾之為德剛健中正純粹以精也坤之為德柔順利貞君子攸行是乾坤配合者金丹之道也惟君子為能攸行小人反是昔孔子曰吾未見剛者或對曰申棖子曰棖也欲焉得剛剛之義大矣哉小人勉強一時剛健又豈能中正既不得中正又焉能純粹其精也耶剛之為物乾也動而直故易知柔之為物坤也動而闢故易從易知則有親易從則有功親而功成可大可久此聖賢之德業也能成位乎剛柔之中者其金丹之道乎所以乾陽之德主乎秉與坤陰之德專乎含受蓋雄雌相須憑精氣精氣舒布要雌雄翼曰精氣為物遊魂為變為物者順行而生生人生物也為變者逆用而成成佛成仙也何謂坎離冠首夫乾剛交坤乾乃中虛而為離坤柔承乾坤乃內實而為坎是以坎離繼乾坤而冠陰陽之首且得剛柔之正離中日光坎中月耀垂輝於下元妙杳冥難可測識不可畫圖惟聖人為能揆度而參贊序述其元基此義與前元精眇難睹推度效符證意同何謂四者混沌蓋陰陽精氣四者包於虛無之竅乃行六十卦張布以為輿也坤為牛為輿乾為龍為馬是乾坤合德而龍馬就駕天下治平而明君御時金液還丹與是同道何哉蓋龍為東方木汞馬即南方砂火龍馬得西方之金虎以生北方元武之水故凝精含氣而成形就駕矣和則隨從路平不邪者明君之御政若行於大路不勞擾於民和氣隨時應稍有不由正路或更邪佞以蔽賢嫉能其國將危矣故九齡往而國忠進安史始萌秦檜用而嶽飛亡燕雲莫復正人力為國者惟恐國之權不在君小人只為身者惟恐國之柄不屬已君子小人無世不有君子當和而容小人小人宜隨而從君子則國無傾危而天下治矣比之修煉以和為先和則事皆隨心而應翼曰和兌之吉行未疑也事既和已必正其心必誠其意必防其虞則無險阻而不傾喪其丹毫髮之差可不愼乎後二十八章重明四者尤詳君子居室章第十七君子居其室出其言善則千里之外應之謂萬乘之主處九重之室發號出令順陰陽節藏器俟時勿違卦月屯以子申蒙用寅戌餘六十卦各自有日聊陳兩象未能究悉立義設刑當仁施德逆之者凶順之者吉按厯法令至誠專密謹候曰辰審察消息纎芥不正悔吝為賊二至改度乖錯委曲隆冬大暑盛夏霜雪二分縱橫不應漏刻水旱相伐風雨不節蝗蟲湧沸羣異旁出天見其怪山崩地裂孝子用心感動皇極近出已口遠流殊域或以招禍或以致福或興太平或造兵革四者之來由乎胸臆動靜有常奉其繩墨四時順宜與氣相得剛柔斷矣不相涉入五行守界不妄盈縮易行周流屈伸返覆此章最為入室之初防間細密煉丹之難等等如是聖人特以君子喻之是易之繫辭曰君子居其室出其言善則千里之外應之况其邇者乎又曰言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也又曰擬之而後言議之而後動擬議以成其變化上陽子曰道本無言非言何由顯道謂無言者有德之士言不可以不愼也况行道修丹之士乎老子曰知者不言言者不知故逞乾慧無所知者其發言論辨無非求知也真師則能察其誑妄淺器必不輕論紫陽公云雖鼎鑊在前刀鋸加頸亦不敢言若是真實行道之器惡可不言且入室採藥切忌輕言果若不言則何以得其藥之真泥丸有云言語不通非眷屬工夫不到不方圓仙翁乃引仙聖之言而又伸之此謂萬乘之主處九重之室發號出令順陰陽節言求丹必順陰陽節候即一陽來復之際藏器待時勿違卦月言採藥必待月現震生即三日出庚之時屯以子申乃水生旺之處蒙用寅戌乃火生庫之位其六十卦各有其日聊陳二卦即屯蒙也未能究悉者仙翁自謂未能盡究詳悉蓋元奧要口授故經云非世上之常辭上聖已成真人通元究微能悉其意此言未能究悉者世無上聖之資豈能行此道而成真人哉立義設刑所以防其欺詐當仁施德所以誘其歡心逆之者凶順之者吉按依法度厯明號令用須至誠行宜專密也謹候日辰者一年止在一月一月止有一日一日止在一時一時止用一符審察消息者必要知其兌金所生之水淸濁分數倘毫釐有差纎芥不正必招責吝賊害丹爐如此乖錯則陰陽差忒二至改度隆冬反為大暑盛夏而有嚴霜春秋二分以縱橫晨夜刻漏而不應雨暘愆伏怪異多端如上咎徵皆喻臨爐一差百錯總因煉已無功致斯乖變愚者不責於已反怨丹經若是大根方寸真實自悔自吝誠心愈勵精勤不退一念通天自有仙助臨事必成亦猶孝子誠心方能感動皇極心者神之舍心實則神明自來言乃心之聲言孚則情性相感語雖道出已口聲傳遠播他方敗則招殃成則致福事乖則或造兵革事濟則身樂太平成敗乖濟四者皆由人心所為動靜不妄必依繩墨則四時應氣相求剛柔和五行正大易之道周流返覆無不順矣如上譬喻要修丹者專心致志慮其危殆而謹防之蓋此丹道不特由我亦由乎天天若或違當以財寶精誠感之不可有逆天道能順天道金丹成矣故同人先號咷而後笑翼曰君子之道或出或處或默或語二人同心其利斷金同心之言其臭如蘭同人之卦者同心之人也其卦一陰而五陽夫陰多陽少則陽為主陽多陰少則陰為主是以同人以孤陰而同乎老陽也故欲得乎同人之心必以利而斷之方得同人之言也是以君子愼密委曲者惟不妄言而又託言語以為之階成丹之道之難可不奉順而謹之乎晦朔合符章第十八晦朔之間合符行中混沌鴻濛牝牡相從滋液潤澤施化流通天地神明不可度量利用安身隱形而藏始於東北箕斗之鄉旋而右轉嘔輪吐萌潛潭見象發散金光昴畢之上震出為徵陽氣造端初九潛龍陽以三立陰以八通三日震動八日兌行九二見龍和平有明三五德就乾體乃成九三夕惕虧折神符盛衰漸革終還其初巽繼其統固濟操持九四或躍進退道危艮主進止不得逾時二十三日典守弦期九五飛龍天位加喜六五坤承結括終始韞養衆子世為類母上九亢龍戰德於野用九翩翩為道規矩陽數已訖訖則復起推情合性轉而相與循環璇璣升降上下周流六爻難可察覩故無常位為易宗祖此章象一月之晦朔弦望以比煉丹之行爻合符蓋一年十二度晦朔弦望天上太陰有十二度與太陽合璧人間少陰有十二度以隱形看經此陰陽之正也惟少陰也溟澾杳冥不可度量聖人測之優遊太極方擬合符始可行中故號先天天上之太陰每會太陽日月合符月在日之下日在月之上月受正日之精光其光向天非人可見亦猶男女交合男在上女在下女為男覆而不可見當此晦朔月在日之下輝光未分比人間之少陰也太極混沌之時先天鴻濛之內經罷符至初三庚方微陽將生陽牡陰牝相從配合其中滋液潤澤自然施化流通天地神明不可度量也夫大道者非聖賢之資則不能運行翼曰與天地合其德與日月合其明四時合其序鬼神合其吉凶金丹之神妙雖天地不能測度雖神明不能猜量何哉金丹乃先天之氣聖人善與天地合德逆施造化以生此氣也聖人能與日月合明顚倒用功以行此氣也聖人巧與四時合序以用此氣而寒暑不相拘聖人潛與鬼神合吉凶以成此氣而鬼神見情狀故天地神明且不可度量惟聖人為能也利用安身隱形而藏此何謂也坤道也坤之為用坤宮有土土制坎水善利萬物而不爭者水之用也聖人能逆用之乃得水之利易之用六利用永貞者坤之德也始於東北箕斗之鄉何謂也每朔月與日會必於箕斗之鄉箕斗為艮艮之為卦陰侵陽也號曰鬼路月每至此而失其明故曰喪朋有若世人順行五行生老病死寒暑代謝也旋而右轉者天道左運日月星辰悉皆右轉月至此鄉必晦而會如璧如圭一日二日旋而右至於庚方精光才吐魄乃生焉畢月昴日月借日光光吐於下如乾陽初生坤之下為震象初三之夕一陽二陰乾之長男得時行道故三日震動也初八上弦一陰二陽坤之少女兌受丁火代坤行道以主其事陰陽和平神明乃生故曰八日兌行也三五為望月全陽輝故曰三五德就乾體乃成如上爻符比丹鼎中已得金水太陰映日而生精魄人身象月而生金丹鼎中有丹夕惕若厲滿則愼溢盛則恐衰惟聖人為能愼終如始巽繼其統固濟操持徐運陰符包褁陽氣艮主進止符滿下弦漸結漸凝天位加喜抽添鉛汞鉛盡汞乾六五坤承結括終始鉛汞俱化金丹已成雖以一月喻其行持功要十月方擬成形功滿則三年功高則一紀在人積行何如耳若夫大聖人再造陰陽推情合性轉而相與別立丹爐復造九鼎大丹亦如璇璣復建於子比十二爻周於一月晦而至朔朔則屆爽初陽再動於復卦矣故云故無常位為易之宗祖也爻變功用章第十九朔旦為復陽氣始通出入無疾立表微剛黃鍾建子兆乃滋彰播施柔暖黎蒸得常臨爐施條開路正光光耀漸進日以益長丑之大呂結正低昻仰以成泰剛柔並隆陰陽交接小往大來輻輳於寅運而趨時漸厯大壯俠列卯門榆莢墮落還歸本根刑德相負晝夜始分夬陰以退陽升而前洗濯羽翮振索宿塵乾健盛明廣被四鄰陽終於已中而相千姤始紀序履霜最先井底寒泉午為蕤賓賓伏於陰陰為主人遁世去位收斂其精懷德俟時棲遲昧冥否塞不通萌者不生陰伸陽屈沒陽姓名觀其權量察仲秋情任畜微稚老枯復榮薺麥芽孽因冒以生剝爛肢體消減其形化氣既竭亡失至神道窮則返歸乎坤元恆順地理承天布宣元幽遠渺隔閡相連應度育種陰陽之元寥廓恍惚莫知其端先迷失軌後為主君無平不陂道之自然變易更盛消息相因終坤復始如循連環帝王承御千載常存上章言一月晦朔弦望採煉成丹之象此章比一年十二月功行之象其初得丹比為復卦復者一陽伏五陰也聖賢攸行此道則超凡入聖邪人若行此道則失命而喪身文王故曰朋來無咎返覆其道七日來復利有攸往朋來者有朋自遠方來也無咎者有益而無損也返覆其道者用易之道也顚倒而行也七日來復者月隱其光七日再吐亦猶人經動七日而陽初生利有攸往者善進而無失東京賦云日月會於龍𧲖者𧲖音鬪尾星也謂陽將復孔子曰復其見天地之心乎世人不知天地之心老子號此心為元牝之門雲房指此心為生門死戶易曰雷在地中復先王至日閉關商旅不行后不省方雷乃剛陽地乃柔陰以剛陽在柔陰之中復彼先天之氣先王至此日行此道則閉關而不省方得專心而致志商旅者雜泛也不行者當絶其雜泛之事專行其道故象傳曰不遠之復以修身也又曰中行獨復以從道也朔旦為復陽氣始通者聖人之心一也復者先伏而後能復也陽之始氣出入相通且無疾害立表微剛者乾動而直也黃鍾之律陽月建子兆者衆庶也始也庶物生此陽氣昔始滋彰播施柔暖黎蒸得常者黎蒸之衆得復柔暖一陽之氣皆能復其常道也上陽子曰作丹之妙其要在此切毋輕忽也學道巳得師訣須曉三關三候何也預營壇墠先採藥物既得藥物出入相通行煉已功柔暖播施微溫直透此為初關第一候也臨御丹爐施條接意闢開道路不僭不狂分彩和光愈低愈下大呂應丑曰景漸長是為中關第二候也大簇律臨仰以成泰泰之為卦地上於天陰若居上水能潤下陽居於下火臨照上故咸之翼曰柔上而剛下二氣感應以相與止而説男下女上是以亨利貞夫五行顚倒天地成寶柔施於前饒他為主剛施於後我反為賓牡初小往牝乃大來金氣相須陽全乾體此云剛柔並隆陰陽交接是為下關第三候也漸厯大壯凝結還丹俠列卯門榆莢歸根刑德相負晝夜始分言丹之兆落在黃庭以防以養宜愼宜專夬之為卦陰以決别陽氣既回金丹懷孕乾健盛明金氣已純陽終於已運行陰符姤承乍包陽無走逸陽復得陰陰為主人坤之為化初六履霜井底寒泉陰氣下來六月為之斂精俟時否屆七月陰陽不通陰伸陽屈陽氣內明八月觀象量察秋情任畜微稚若麥之蘖老枯復榮若薺之芽化氣既竭剝消其形道窮則返歸乎坤元一來一往恆順承天此書撰作深有法度或序冒頭或括結尾無冒頭者結尾括之無結尾者冒頭總之即如此章是無冒頭而以結尾括之其首句曰朔旦為復復而臨臨而泰泰而大壯壯而夬夬而乾乾而姤姤而遁遁而否否而觀觀而剝剝而坤尾郤結曰元幽遠渺隔閡相連只此兩語最為簡易元幽遠渺者陰陽二物至元極幽不可摸捉至遠極渺不可思議而其造化功倍天地隔閡相連者二物間隔動幾萬里若得黃婆以媒合之則雖至遠而至近也是以兩物應度而育種為陰陽之元聖人用之而行其道寥廓恍惚而不足捉摸者未容度量聖人推之以逆其用也先迷失軌後為主君者柔順利貞君子攸行先迷失道後順得常此十翼之辭也仙翁引而詳之中言陰為主人末曰後為主君皆坤之利地之道也無平不陂道之自然水之至平瀦為淵陂畔岸不流陂若盈科則水自汛以水喻道自然之理變易更盛猶復至乾消息相因如姤至坤故云終坤復始如循連環也帝王承御千載常存者若帝王能承御乾坤逆順之道則千載之夀亦未為多若功崇行著白日升天亦分內事昔黃帝一世為民修世間福再世乃得為臣復修出世功德三世乃得為君遂捐天下離棄萬幾尋山水幽絶處得鼎湖之君山煉此九還大丹丹成之後白日乘龍而上升也按君山即洞庭湖湖中有山因黃帝煉丹故號曰君山也養性立命章第二十將欲養性延命郤期審思後末當慮其先人所秉軀體本一無元精雲布因氣託初陰陽為度魂魄所居陽神日魂陰神月魄魂之與魄互為室宅性主處內立置鄞鄂情主營外築垣城郭城郭完全人物乃安爰斯之時情合乾坤乾動而直氣布精流坤靜而翕為道舍廬剛施而退柔化以滋九還七返八歸六居男白女赤金火相拘則水定火五行之初上善若水淸而無瑕道之形象真一難圖變而分布各自獨居類如雞子白黑相符縱廣一寸以為始初四肢五臟筋骨乃俱彌厯十月脫出其胞骨弱可卷肉滑若鉛此章言人先須養性乃可修命且性者何也乾之物也人能養之則乾陽不虧精從內守氣自外生可以煉丹可以入聖世人莫知性命兩者為一何物或猜性是靈明知覺或以性為肉團頑心或認思想識神為性或指不可捉摸為性或以頑空為性或以令為命他豈知杳杳冥冥之物為命又焉知生生化化之門為命惟只盲猜夢想怎達聖人之道哉黃帝曰天性人也人心機也君子得之固窮小人得之輕命孔子曰窮理盡性以至於命孟子曰存其心養其性所以俟天命也夭夀不二修身以俟之所以立命也聖人之道傳至孟子忒殺分明翼曰昔者聖人作易也將以順性命之理是以立天之道曰陰與陽立地之道曰柔與剛立人之道曰仁與義上仙云修性不修命如何能入聖修命先修性方入修行徑人言釋氏修性道家修命天下豈有二道哉是不參孟子存心養性修身立命之道蓋欲立命先養其性若不悟性焉能知命故中庸天命之謂性率性之謂道是以聖人無兩心也此謂將欲養性延命郤期世人不知何者為養性洞賓乃以煉丹以曉之不知何者為立命張許乃以煉丹以喻之惟精惟一允執厥中此養性也男女媾精萬物化生此立命也積精纍氣此養性也流戊就已此立命也審思後末者人負聰慧執僻不回謂有生必有死奚有長生也哉聖仙與佛皆天所生師豈能授人豈能為是不審思甘分守死當慮其先者慮即念也當念我身從何而有若云父母陰陽之氣所生則陰陽之氣必可延命必可成仙佛矣故修大丹與生身受氣之初渾無差別但有逆順耳仲尼曰未知生焉知死聖人明性命之所以死生示陰陽之道緣何逆順故順而生物者人也逆而生丹者聖也此之謂元精雲布因氣託初何謂陰陽為度魂魄所居蓋陰陽以魂魄為體魂魄就陰陽為舍離為日魂坎為月魄魄乃陰中之陽戊土專之魂乃陽中之陰已土直之魂魄互為室宅陰陽兩相交通性主實精於內立置鄞鄂情主伏氣於外築垣城郭城者何也承華之包也郭者何也煉丹之室也當斯之時乾之性動而直則精氣合體坤之情靜而翕為道舍廬剛而直者一施則退柔而化者布潤以滋丹産於鼎還返成功所謂九還者地四生金天九成銀龍虎相交金銀之氣復還鼎中故云九還其七返者地二生火天七成砂魂魄相戀砂火之精返照鼎中故云七返八歸者天三生木地八成汞戊已一合木汞之真歸煉鼎中故云八歸曰六居者天一生水地六成鉛情性相感鉛汞之妙回居鼎中故云六居男白女赤金火相拘男屬靑龍之木受兌金之氣煉而返白女屬白虎之金被離火之精鍊而還赤也則水定火者壇墠精嚴藥物真正須則其水之多少而抽添之約其火之老嫩而烹煉之此時為五行造化之初上善若水者水中有金能生麗水探其至淸全無撓動無質無瑕方能變化是云上善道之形象者男女即道之形乾坤乃道之象形與象之中能生真一之氣乃不可以畫其形而圖其象也故此形此象各任化機分布而居秉生秉殺甲乙自東而遊庚辛自西而舍故云各自獨居也類如雞子者還丹有也黑白相符者陰陽得匹也縱廣一寸者丹結之初來如黍米之微漸覺一寸之廣非但神室充裕緼遍四肢潤澤五臟筋骨一皆快暢十月功滿丹已成形脫去其胞號曰陽神陽神之象乃先天之氣結成骨故可卷而軟肉比鉛華而滑非若後天之精血以成人物者其骨重肉滓不能變化肉滑若鉛鉛猶鉛粉亦曰鉛華俗言水粉潔白軟滑女婦以此飾面尚增光彩况此陽神乃先天真鉛之氣以凝結而成其形乎此與第六章內以養巳相應二氣感化章第二十一陽燧以取火非日不生光方諸非星月安能得水漿二氣元且遠感化尚相通何况近存身切在於心胸陰陽配日月水火為效徵陽燧者陽之物也其中有氣故感日而能生火方諸者陰之物也其中有精故感月而能生水日月在天之高遠陽燧方諸之至微陰陽二氣尚相感化况乎人身真陰真陽切在心胸可親可密近而易求安有相通而不感化哉緣以後之人不得其道耳人身之陰陽以比天上之日月諸燧之水火以喻人身之精氣無情之物尚爾相通有情有靈自然交感且天地間最靈者人也雖至賤至愚者皆知陰陽化育之理不待教令而使之然一切愚迷但知順行以生人物至於逆用非師罔通蓋逆用陰陽之道乃煉精伏氣以成丹也此章單明陰陽二氣以相感通而成造化也關鍵三寶章第二十二耳目口三寶閉塞無發通真人潛深淵浮遊守規中旋曲以視聽開闔皆合同為已之樞轄動靜不竭窮離氣內營衛坎乃不用聰兌合不以談希言順鴻濛三者既關鍵緩體處空房委志歸虛無無念以為常證難以推移心專不縱橫寢寐神相抱覺悟候存亡顏色浸以潤骨節益堅強排郤衆陰邪然後立正陽修之不輟休庶氣雲雨行淫淫若春澤液液象解冰從頭流達足究竟復上升往來洞無極怫怫被谷中反者道之驗弱者德之柄耕耘宿穢污細微得調暢濁者淸之路昏久則昭明此章詳明煉丹入室之密旨學者得師口訣便須誦此章萬遍句句熟玩字字尋詳勿輕易讀過去一字不透不能成丹蓋此一章乃參同契著緊合尖處其中有不以語言泄露者上天所寶也且夫人生於世性無有不善及乎年既長非負上聖之資介然自守者鮮淫朋妄友牽誘於外聲色嗜欲迷惑於內六根門頭色色皆愛日用夜作件件戕賊最苦毒者耳目口也耳聽乎聲目視乎色口嗜乎味由此之故福從色敗害隨聲至病因口入夢生醉死遞遞何窮學士多不能成道者皆被耳目口三者鄰朋互誘汨喪其真仙翁以耳目口為三寶者尊重而不敢輕放是用閉塞勿令發通入室之際大用現前六根大定方可採煉真人即已土也潛深淵者用己土去尅水以求丹浮遊守規中者規中名造化窟也若煉大丹於此一符之頃切須愼密浮遊者常靜而又常應暫時不離此用守者勤勤內照誠有所待也此兩句又為參同契中合尖處用一下大斧底工夫相似是以真仙聖師所出元言法語萬世莫能猜之上陽子因盡泄之者但願人人皆明此道而行之也旋曲以視聽者非蠢然之閉塞也內能旋曲委宛微愼而視聽之使戊土之開闔不隱不瞞與已土以合同若吞若啖已之為性顚倒猖狂必得戊土為其樞轄是云為已之樞轄何謂動靜不竭窮蓋已之為道其動也直其靜也專若善用之不致窮竭離氣內營衛目光內照也坎乃不用聰耳須內聽也兌合不以談希言而調息以順鴻濛之施化惟此三者善於關鍵方可緩體處於空房緩體者優遊而不勞空房者嚴淨而不雜委志歸虛無蓋虛無者氣之所生處也是曰先天一氣自虛無中來要得此氣必當委曲志慮以求之也無念以為常無念二字最為受用真人潛深淵無念以應之浮遊守規中無念以候之呼吸相含育無念以致之三性既會合無念以入之能應能候能致能入其功惟多故以為常也證難以推移者戊之為物號曰白虎虎之為變易動難安若以已土會之切毋縱橫推移心或不專恐生災異前云無念此又云心專不縱橫可不諦思之乎寢寐神相抱者心不縱橫又不推移於斯寢寐之頃神氣自相抱一又須常覺而常悟候其一氣之存亡煉丹之功用力至此方自知驗豫往昔得師之旨此假以為甚難近從大羅山之陰行此大功始覺易也大要修之而不輟休方能成就其全功也故仙翁自明採取燒煉之時不可毫髮差忒自顏色浸以潤而下句句緊用著無一句放間皆得丹之後有自然之效見種種之驗凡修此道者居五濁惡世修出世間法人行之不輟久則功必成勿因小魔障中道而棄之是云濁者淸之路昏久則昭明證聖成仙指日可冀功最神速故名之曰神丹傍門無功章第二十三世人好小術不審道淺深棄正從邪徑欲速閼不通猶盲不任杖聾者聽宮商沒水捕雉兔登山索魚龍植麥欲獲黍運規以求方竭力勞精神終年無見功欲知伏食法事約而不繁世人好小術小術不是道器局若淺小不可聞大道道大包天地道深濶如海人固不可聞先被盲師毒先入言為主正道無由聞旁門好採戰棄正從邪徑服藥求輕舉欲速閼不通精竭不養性猶盲不任杖借道咨談辨如聾聽宮商沒水捕雉兔何不參同類五行不顚倒登山索魚龍枯坐以求仙植麥欲獲黍無為若辦道運規以求方如上種種為竭力勞精神若不遇聖師終年無見功欲知伏食法古仙語不繁伏氣不服氣服氣須伏氣服氣不長生長生須伏氣斯言真妙訣以詔高上人流珠金華章第二十四太陽流珠常欲去人卒得金華轉而相因化為白液凝而至堅金華先唱有頃之間解化為水馬齒瓓玕陽乃往和情性自然迫促時陰拘蓄禁門慈母養育孝子報恩嚴父施令教敕子孫五行錯王相據以生火性銷金金伐木榮三五與一天地至精可以口訣難以書傳子當右轉午乃東旋卯酉界隔主客二名龍呼於虎虎吸龍精兩相飲食俱相貪便遂相銜咽咀嚼相吞熒惑守西太白經天殺氣所臨何有不傾狸犬守鼠鳥雀畏鸇各得其功何敢有聲不得其理難以妄言竭殫家産妻子飢貧自古及今好者億人訖不諧遇希有能成廣求名藥與道乖殊此章分明指示流珠金華為陰陽之二物復示燒煉之密旨其間透露大為詳切可以口訣難以書傳是也上陽子乃重宣此義而為偈言太陽流珠離有日烏離宮姹女非色非珠太陽隱明實稱乾父砂中有汞汞為砂祖世人緣因六賊引逼劂鑿流珠或𣺶音嘶龍所吐涎也或逸金本居兌寓坎生華坎之真水乃尅離砂汞被金水制伏轉變化為白液應時燒煉金返居前吐華先唱真土云已已須神王己曰地神擁一玉局升於高座暴露雙足金華化水有頃之間色如馬齒鍾乳瓓玕乾陽為賓往以求友陽性陰情嘻音熙暖也相蟠糾陰被陽迫陽被陰促彼促我迫時陰拘畜兩腎之間號曰禁門一陰一陽一乾一坤慈母云金金生坎水水即金公水稱孝子嚴父云木木生砂汞子又生孫子繼孫踵慮不精專嚴施號令五行錯王顚倒尅應鉛汞砂銀相據於土火盛生土土為金母火王銷金木畏金刑金被火伐木乃敷榮東南同五木三火二西北同五水一金四中央戊己是曰三五數一至萬兆經垓補數合天地蘉音忙勉也感至精此感彼合口訣須明子當右轉若謇若遄陽金生子午乃東旋陰汞生午包固陽精卯酉東西主客二名金木間隔相去萬里懷仁懷德金順木喜龍呼虎吸金戀木仁一主一賓飲食相親一烏一兔俱相貪便一男一女遂相銜咽一龜一蛇咀嚼相吞南方之神朱雀熒惑守占於西煅煉金德兌之殺方愼毋差忒含儲生意氣日太白經行黃道信歸乾戶殺氣一臨生氣自布猶貓捕鼠似雀畏鸇各得其功何敢有聲不得口訣奚可猜言枉耗家産行諸旁門邪蹊曲徑採戰誤真誤誘罪重豈顧他貧自古及今好者億人不遇真師希有能成未明陰陽豈知同類廣求名藥愈耗真氣金石草木非類無情去道乖遠寥隔萬程法則後學梗概敷陳備明奧典得做仙真如審遭逢章第二十五如審遭逢覩其端緒以類相况揆物終始五行相尅更為父母母含滋液父主秉與凝精流形金石不朽審專不泄得為成道立竿見影呼谷傳響豈不靈哉天地至象若以野葛一寸巴豆一兩入喉輒僵不得俯仰當此之時周文揲蓍孔子占象扁鵲操針巫咸扣鼓安能令蘇復起馳走此章乃謂人若遇師先須審察覩其端緒是正是邪將此參同契勘果是明師問無不知略無留滯若是盲師十不知九百端揑怪引人落草或以無言是道或惟打坐觀空問其砂汞虎龍金木間隔三日震象逆用先天不曉丹經啞口無對世之愚夫但聞何人打坐幾年某人入闤幾處便紛言其有道他豈知馬祖南嶽磨磚之誚乎又豈知陰陽吞啖生殺之理乎有輩俗子略記前人口滓日惟説禪鋒辨橫論喚作性宗指此為道以愚世人尤為可笑彼惡知禪與性哉何謂性即乾用九其動也直若能了此即正法眼藏也何謂禪即坤用六其動也闢若也知之即涅槃妙心也禪與性合以土制鉛也金木相投以鉛伏汞也仁與義施以直養氣也故一陰一陽易之道也離宮修定禪之宗也水府求元丹之府也名雖分三道惟一爾覩其三教修養之端緒皆要同類方能成功此云以類相况也何謂揆物終始當揆度其生人生物陰陽終始消息之因是以五行相生相尅一旺一衰劫劫更易而為父母上聖至人所行之道陰陽而已其主含儲滋液之氣者坤兌更易而為聖母也其主秉與生成之妙者乾震更易而為靈父也氣液凝精流而成形以結為丹如金石之固而不朽也審察專一方乃不泄可得成道若立百尺之竿而見影如呼千巖之谷而傳響陰陽自然影響交感最為靈驗以合天地造化之至象也野葛巴豆無情之草木尚爾殺人文王大聖周公孔子庶聖扁鵲神醫巫咸賢師蓍占針禱其毒氣不可療况乎真陰真陽之氣同類有情之物以相匹配安有不結靈丹者乎姹女黃芽章第二十六河上姹女靈而最神得火則飛不見埃塵鬼隱龍匿莫知所存將欲制之黃芽為根物為陰陽違天背元牝雞自卵其雛不全夫何故乎配合未連三五不交剛柔離分施化之精天地自然火動炎上水流潤下非有師導使其然也資始統正不可復改觀其雌雄交姤之時剛柔相結而不可解得其節符非有工巧以制御之男生而伏女偃其軀秉乎胞胎受氣元初非徒生時著而見之及其死也亦復效之此非父母教令其然本在交姤定置始先河上乃愛河欲海之喻姹女即自已陰汞之精何謂靈而最神以其功能生人亦能殺人又能合丹當寂然不動之時一靈內養忽感而遂通之頃奔驟如神境動情生福從色敗意念才起汞逐火飛如埃與塵不可復拾鬼隱其精龍匿其雲散天空空即是色此與二十四章太陽流珠常欲去人義同人謾爾看將過去故復到此引而伸之聖人功蓋後世類多如此將欲制之黃芽為根即前卒得金華轉而相因義同蓋如姹女因之順而易失非彼黃芽之一陽不能制伏黃芽即先天之氣號真一之鉛燒此鉛氣以為根基其汞自不奔逸何哉陰陽配而使之然也物無陰陽是違造化之天背其生物之元修丹者不離陰陽以立根基倘真一之氣既還丹已成熟則方跳去陰陽之外世之愚人不看丹經謂修行者必居深山必先孤處必棄妻子必當辟穀必合無為必要打坐以此為道何其愚哉若也不用陰陽不究五行不辨金木不知龍虎不識鉛汞不明坎離只以無言烏可成道是以此書力救其敝厯言陰陽配合方謂之道只如牝雞不雄自卵覆雛不成為其孤陰無陽若欲生雛當午盛水曝而溫之假借陽氣雛乃可全若不溫之必不生也夫何故亦如造化配合未連三五不交剛柔離分豈成生生之道是以女人之國無男子若欲孕則必擇日一日三時俯觀井底亦借真水之氣是觀井中之象以為交感方能懷妊所謂陰陽施化之精天地自然相感之道若此火炎上水潤下非有師導以使其然資始統正一氣已定翼曰大哉乾元萬物資始乃統天乾道變化各正性命性命已正安可復改故曰觀夫雌雄交姤之時剛柔相結而不可解得其節符非有工巧制御必男生而伏女偃其軀此皆極理之論造化不能移易豈但生乎溺而死者亦必男伏女偃此非父母教令使然本在交姤定置始先俗眼看來語似屑屑本其著書之意令人洞達陰陽之理語故頻而不煩也男女相須章第二十七坎男為月離女為日日以施德月以舒光月受日化體不虧傷陽失其契陰侵其明晦朔薄蝕掩冒相傾陽消其形陰凌災生男女相胥含吐以滋雌雄錯雜以類相求金化為水水性周章火化為土水不得行男動外施女靜內藏溢度過節為女所拘魄以鈐魂不得淫奢不寒不暑進退合時各得其和俱吐證符坎為水為月為中男離為火為日為中女坎外陰而內陽中有戊土以儲金水養其陰魄為中情為道義之門黑中之白也離內陰而外陽中有已土以居砂汞主其陽魂為成性為仁德之體白中之黑也月體本黑受日之化光彩復舒而體不虧陽失其契契合也陰侵陽明薄蝕者晦朔之間月掩日光正對的射日體居上月在日下暫障日光此謂陽消其陰凌災生以此世人不能保守真陽數為陰所凌爍若也雌雄得類顚倒相感男女相胥逆求化機則其兌金化生坎水非得真土則坎之水周流泛濫離中有火火能生己土以制坎水水不泛矣是以男之為道乾剛而外施女之為德坤靜而內藏若乾外施溢度過節則為坤女之所拘制魄以鈐魂魄屬於兌魂屬於震震男兌女陰陽相交不得淫奢必使一寒一暑得其進退和合有時不愆不忒則其雌雄各吐符證乃可見其效驗者矣此章大義在乎周章溢度淫奢過節則陰凌而災生致仲冬行夏令成隆暑仲夏行冬令返嚴寒即男行而女不隨陽唱而陰不和陰陽乖錯皆由周章而淫奢也修丹不易切毋自輕昔純陽翁既得鍾離老仙之傳及其入室纍次下工以未盡善不即成丹復蒙玄元崔真人授以入藥鏡方得洞達乃作詩曰因看崔公入藥鏡令人心地轉分明厥後用功旋即成就後之愚人專以無為頑空是道依稀度日任生任死此輩為教中大罪人况敢言修行一事哉四者混沌章第二十八丹砂木精得金乃并金水合處木火為侶四者混沌列為龍虎龍陽數奇虎陰數偶肝靑為父肺白為母腎黑為子離赤為女脾黃為祖子五行始三物一家都歸戊己上陽子曰夫人之身最靈而至寶者精與氣也心印經以為上藥張紫陽以為命寶仙翁所撰之書則有同而有異何謂同曰金來歸性初乃得稱還丹此最簡而同也何謂異曰乾坤坎離曰牝牡槖籥曰開曰闔曰無曰有曰陰陽曰日月曰元牝曰戊己曰剛柔曰雌雄曰斗樞曰魁罡曰烏兔曰魂魄曰金氣曰神明曰黃芽曰河車曰鉛銀曰砂汞曰浮沉曰白黑曰鴻濛曰恍惚曰規中曰樞轄曰虛無曰杳冥曰真人曰太淵曰垣闕曰蓬壺曰朱雀曰龜蛇曰白虎曰靑龍曰熬樞曰流珠曰金砂曰水銀曰八石曰黃土曰兩孔穴曰神德居曰偃月爐曰懸胎鼎曰赤色門曰明窗塵曰上下弦曰文武火曰丹砂木精曰河上姹女曰鄞鄂城郭曰馬齒瓓玕曰禁門曰刀圭曰金華曰秋石曰情性曰主客曰白雪曰黃輿曰元溝曰河鼓曰甑山曰晷影曰鍾乳曰蒼液曰三五曰兩七曰銖兩曰爻符等等名色如是一皆身中之寶或喻門戶或言神室或云鼎器或譬體用或雜形象或比進退故易道以乾直坤闢為生死之門丹法以鵲橋黃道為往來之路不離己身之精氣耳此假名而異字故此章言丹砂木精得金乃并又合前太陽流珠常欲去人卒得金華轉而相因之義同也蓋謂流珠謂姹女謂丹砂本皆有陰而無陽以屬後天不能成丹金與黃芽金華乃先天之鉛可煉還丹故夫丹砂木精即離中之汞火火之父為東方甲乙之木以生真精是謂中女是以東方甲乙之木與南方丙丁之火一父一女也父與其女為陽中之陰則震木離火為之侶也黃芽金液為坎中之鉛水水之母乃西方庚辛之金以孕其液而為中男是以西方庚辛之金與北方壬癸之水一母一子也母與其子為陰中之陽則兌金坎水以合處也木火金水四者混沌列為龍虎一東一西龍居東其數三故云龍陽數奇虎屬西其數四故云虎陰數偶木火為侶者龍從火裏出也金水合處者虎向水中生也肝靑屬木為火之父肺白屬金為水之母腎黑屬水為金之子離赤屬火為木之女脾黃屬土四者之祖子居五行之始故為一陽之首金與水木與火龍與虎是謂三物若此三物交會而作一家則必藉戊己二土之力方能成其功用也卯酉刑德章第二十九剛柔迭興更厯分布龍西虎東建緯卯酉刑德並會相見歡喜刑主伏殺德主生起二月榆落魁臨於卯八月麥生天罡據酉子南午北互為綱紀一九之數終而復始含元虛危播精於子靑龍屬東白虎屬西此其正也更厯分布者靑龍建緯於酉白虎建緯於卯是刑德並會而龍虎歡喜顚倒相見故龍虎相見會合一處則二物歡喜以主生為德若龍東虎西定位各居自生自旺則二物相競紛擾以主殺為刑刑者陰陽乖錯之義雌雄相見之喻刑者五行順行之謂德者五行顚倒之意刑者陰消其陽德者陽合乎陰刑者陰多而陽少德者陰少而陽多且如四陽而二陰二月之卦也陽長陰退其陽雖多而有餘陰陽多為德餘陰主殺是以三春萬物並生而榆莢墮落者一如人也年方及壯一身之中陽多陰少日壯一日郤於此時欲火太熾其陽雖多皆為陰消縱有餘陽不能主宰百病來侵將暨陽脫猶復念念在於欲界儘力求陰餘陽遇陰悉皆消脫卒然而終此之謂德返為刑也若是上智乘其餘陽以為階梯急行還丹之道可復長生是之謂刑德並會也是為相見歡喜也又如四陰而二陽八月之卦也陽為陰消其陰雖多尚有餘陽陰多為刑餘陽主生是以三秋萬物將零而薺麥乃生一如人也年將六十一身之中陰多陽少日衰一日若於此時幸有餘陽而行金丹之道能令陽復是謂返老還童也是謂長生久視也是之謂刑返為德也二月子時斗之魁星臨於卯位罡星臨於己上位屬東南主生為德八月戌時斗之罡星據於酉地魁星臨於亥上位次西北主殺為刑經云罡星指丑其身在未所指者吉所在者凶餘位皆然此喻煉丹之功用也子南午北者顚倒五行也仙聖云五行順行法界火坑五行顚倒大地成寶所以水火互為綱紀方能既濟也陽生於一成於九陽數至九則極極則復於一此謂一九之數終而復始含元虛危播精於子者丹之神功在此兩句蓋虛危之次日月合璧之地一陽初生之方龜蛇蟠結之所故太一所含先天之元氣其真精遇子則播施此復應前章子五行始之義也世人但聞卯酉為沐浴豈能明刑德之喻蓋德與生即半時得藥之比刑與殺則頃刻失喪之喻是以入室之際直須防危慮險方可煉丹仙翁比為春旺之時何物不生而榆莢死者德中防刑生中防殺也秋肅之候何物不凋而薺麥生者刑中有德殺中有生也是書厯厯而論種種而明者其主意之妙惟要得先天之氣爾君子好逑章第三十關關雎鳩在河之洲𥥆窕淑女君子好逑雄不獨處雌不孤居玄武龜蛇蟠虬相扶以明牝牡意當相須假使二女共室顏色甚姝蘇秦通言張儀合媒發辨利舌奮舒美辭推心調諧合為夫妻弊髮腐齒終不相知若藥物非種名類不同分刻參差失其綱紀雖黃帝臨爐太乙執火八公搗煉淮南調合立宇崇壇玉為階陛麟脯鳳脂把籍長跪禱祝神祗請哀諸鬼沐浴齋戒冀有所望亦猶和膠補釜以磠塗瘡去冷加冰除熱用湯飛龜舞蛇愈見乖張仙翁直指金丹必須同類藥物一陰一陽必資交感一牝一牡方得化生倘獨居孤處安得化化之機若夫衆雌無雄豈有生生之道欲煉還丹必求先天一氣以成也此章句語直露不宜重述為是書者乃泄天地造化之機倅乾坤生育之德煥日月合明之理漏陰陽逆施之功易曰與天地合其德日月合其明四時合其序鬼神合其吉凶先天而天弗違後天而奉天時天且弗違而况於人乎主此道者聖人也行此道者神人也此書在在處處天地神祗日月星辰雷霆萬神常切扈衛上賢敬受誦至萬遍仙真降庭告以上道若彼下愚妄生謗毁則有神鬼陰録其過注於黑籍小則惡病纒身大則黑司促算徒為幽陰之鬼長墮苦海之中福善禍淫昭然毋忽下卷聖賢伏煉章第三十一惟昔聖賢懷玄抱真伏煉九鼎化迹隱淪含精養神通德三光津液腠理筋骨緻堅衆邪辟除正氣長存纍積長久變形而仙憂憫後生好道之倫隨傍風采指畫古文著為圖籍開示後昆露見枝條隱藏本根託號諸名覆謬衆文學者得之韞櫝終身子繼父業孫踵祖先傳世迷惑竟無見聞遂使宦者不仕農夫失耘商人棄貨志士家貧吾甚傷之定録此文字約易思事省不繁披列其條核實可觀分兩有數因而相循故為亂辭孔竅其門智者審思用意參焉古聖大賢必明至道故伏羲神農黃帝之書皆言大道陰符尚存其經三百一十五字後人因不明道亂猜其經乃謂百言演道百言演法百言演術者聾瞽一世彼安足知聖人之道哉蓋陰符自觀天之道百二十字乃敘道之綱領自天地萬物之盜九十一字乃下手之用自瞽者善聽一百四字乃成功之要是以黃帝鼎湖伏煉九鼎大丹乘龍上升郤非燒煉金石草木之謂乃伏先天之氣以成丹爾故云伏煉非服煉也所謂伏煉者各有其事如懷玄抱真化迹隱淪含精養神通德三光如上七者首事先行是云爐火是之謂煉己若能煉己則真氣薰蒸遍於一身如爐中有火暖氣似燒故謂之爐火故謂之煉己也津液腠理筋骨緻堅衆邪辟除正氣長存如上四者是云伏氣是之謂煉丹蓋懷玄者內懷玄一之氣抱真者負抱太乙之真化迹者韜光藏迹使人不我知故知我者稀則識我者貴隱淪者沈隱淪匿使人不可識故古之善為士者微妙玄通深不可識含精者抱含真汞之精以煉己養神者外養全體之神以合氣纍功至此大要通德三光德者修行之上事也修道而不修德是有陰而無陽道德全修陰陽自配人之修德自云有德而實無德緣以妄想德不感通修行之土德愈深厚自不想德天地神明日月星辰德皆感徹如張葛許自積自修心實罔覬此為通德三光也煉已既勤積德通感方可伏煉大丹津液腠理者津乃玉津即白雪也液乃金液即黃芽也玉津金液腠理於神室之中則一身之筋骨緻堅衆邪者百骸之陰皆得辟除正氣乃先天之陽長存不壞積纍長久變形而仙黃帝伏煉九鼎大丹者此之謂也慶會録云昔軒轅氏一世為民再世為臣三世為君濟世積功數盡升天陰符而下列聖相繼載於經者文王周易明乾坤其易之門咸恆夫婦之道孔子十翼明乾動而直坤靜而翕之義道德五千明有無玄牝之門子思中庸天命之謂性率性之謂道孟子養浩氣明至大至剛以直養而無害籛鏗老彭之比列風莊鵬之喻皆由聖賢以至仙也其憂憫後學好道之士遂其風采指畫著為圖籍開示後昆或露見枝條隱藏本根或託號諸名覆謬衆文所謂露見者纍露其大概如乾坤其易之門耶是也至於本根必資口授故隱藏耳所謂託號覆謬者不可顯言比方借喻散於羣書之內後之明眼者既得其文不遇其人韞櫝而終其身若是法器之子公孫繼踵可也有輩學人雖録此文不得師旨迷以傳迷引入邪徑竟無見聞趨走旁門陰陽不知五行錯亂洎乎後來修道之流據此文書且無口訣此輩有若士農工商失其本業只如宦者求官無路以登仕版農夫欲佃無地而可以耘鋤工藝抱術而莫施商賈計利而亡本即如學者雖有其文未承師訣無下手處謬猜妄行烏能成道仙翁惻憫陶冶爐開定録此文為億世法字約而義易思如真人潛深淵之句事省而理不繁有金來歸性初之語披列其條者即此上篇分十五章披露陰陽造化採丹首尾中篇分十五章詳列分兩符候下篇五章法象成功後人覩此所列之條綜核其實便於觀覽其間數目分兩皆有法度得師一指依此循習可以成丹亂辭者即託號覆謬之義孔竅者包括玄妙之深實大劫之梯航為昏衢之智燭後聖亞賢審思密用伏惟大道非聖莫明非賢不語故父不得傳之於子臣不得獻之於君聖人之道豈不傳耶謂恐無德而難承當或若輕言後必顚踣是云智者審思用意參焉法象成功章第三十二法象莫大乎天地兮玄溝數萬里河鼓臨星紀兮人民皆驚駭晷影妄前郤兮九年被凶咎皇上覽視之兮王者退自改關鍵有低昂兮害氣遂奔走江淮之枯竭兮水流注於海天地之雌雄兮徘徊子與午寅申陰陽祖兮出入復終始循斗而招搖兮執衡定元紀升熬於甑山兮炎火張設下白虎導唱前兮蒼液和於後朱雀翺翔戲兮飛揚色五彩遭遇羅網施兮壓之不得舉嗷嗷聲甚悲兮嬰兒之慕母顚倒就湯鑊兮摧折傷毛羽漏刻未過半兮魚鱗狎鬣起五色象炫耀兮變化無常主潏潏鼎沸馳兮暴湧不休止接連重疊纍兮犬牙相錯距形似仲冬冰兮瓓玕吐鍾乳崔嵬而雜厠兮交積相支柱陰陽得其配兮淡薄而相守靑龍處房六兮春花震東卯白虎在昴七兮秋芒兌西酉朱雀在張二兮正陽雜南午三者俱來朝兮家屬為親侶本之但二物兮末而為三五三五并與一兮都集歸二所治之如上科兮日數亦取甫先白而後黃兮赤黑達表裏名曰第一鼎兮食如大黍米自然之所為兮非有邪偽道山澤氣相蒸兮興雲而為雨泥竭遂成塵兮火滅化為土若檗染為黃兮似藍成緑組皮革煮成膠兮麴𡾹化為酒同類易施工兮非種難為巧惟斯之妙術兮審諦不誑語傳於億世後兮昭然自可考煥若星經漢兮昺如水宗海思之務令熱兮反覆視上下千周燦彬彬兮萬遍將可覩神明或告人兮心靈乍自悟探端索其緒兮必得其門戶入道無適莫兮常傳於賢者上陽子曰聖人之道大包天地細入微塵傳云至廣大而盡精微極高明道中庸庸道乃天所祕實不顯竹帛惟只口口相傳聖人無可奈何百般引喻示以後黃人帝岐伯之問始云精不足者補之以味形不足者補之以氣只此一語盡露金丹及文王重伏羲之易曰西南得朋此又露補氣之方孔子又曰同聲相應同氣相求此又指補氣之類老子則曰玄牝之門是為天地根此郤明補氣之門參同契厯厯指示藥物鼎爐斤兩火候金氣相胥真人潛深淵之誨最明且切復於下篇法象比喻聖聖相傳其揆一也故金液九還大丹無非補其一氣耳然補陰必用陽補陽必用陰本乎太極之氣借名金丹何謂金何謂丹謂乾始金謂坤始丹乾初太極金附於坤坤初太極氣化為丹乾金布坤經郤流轉金隱於兌兌金生水水初生丹丹在虎圈故虎向水中生虎居於西若要合丹先降其龍龍家於木化現於離離有陰火故龍從火裏出夫龍居東九氣之蒼天靑帝籥之以為真宰而生萬物虎居西七氣之素天白帝槖之以成造化而産萬物自西至東數萬餘里今仙翁以天地而喻離坎以金鼎而譬玄溝河鼓星紀以比會合晷影前郤而比乾龍皇上覽視以比頓悟而明了關鍵害氣比收拾而閉塞以雌雄指子午以出入指寅申甑山者杳冥之門招搖者恍惚之戶白虎乃金之物朱雀乃火之精羅網喻下手也湯鑊比烹煉也鼎沸暴湧氣之盛也接連疊壘足其藥也瓓玕鍾乳丹肇形像雜厠交柱德合陰陽靑龍處房入室了事白虎在昴得藥歸爐朱雀在張神己合氣二物即鉛汞也三五者簇五行也一者坎之水二者離之火先白而後黃者白乃金也黃乃土形赤黑達表裏者赤乃火容黑乃鉛體五行全陰陽會名為一鼎其大如黍米經云元始懸一寶珠大如黍米在空玄之中者此也自然之所為是皆陰陽造化自然感通之道也非有邪偽道者非旁門採戰左道邪術也山澤氣相蒸者喻金丹亦陰陽之氣相蒸而成泥竭遂成塵者比真氣入鼎遂結成丹染黃用檗緑用藍煮皮成膠麯成酒喻得金液必成還丹也同類易施功者如乾以坤為類震以兌為類則陰陽和而功易施非種難為巧者如兌以巽為種陰以雌為種二女同居豈能成造化哉斯之妙術明審諦當實非誑語傳於億世後者此書此道如星之在天誰不可覩若水之宗海豈有異流雖萬億世莫能離此道也詳玩熟思反覆萬遍自感神明告人或心靈自悟也聖賢著書尾必應首此書上卷首章云乾坤易之門戶至此末章乃直曰探端索其緒兮必得其門戶是謂原始返終天道無私常傳賢者學道之士宜諦思之鼎器妙用章第三十三此章原接法象之下緣鼎器亦法象耳彭真一謂其辭理鈎連字句零碎置於後非也仙聖所述深有法度不可輕移况句皆三字叶韻又一體法今依原本正之於此也圓三五寸一分此詳明三五一之旨是書凡言三五者十一章三五既和諧二十四章三五與一天地至精二十六章三五不交剛柔離分三十二章本之但二物末而為三五此章以三五一為首句者使人洞明三五一之旨則知鼎器有三五之妙藥物有一寸之真火候正一分之用圓者熟也若能圓明熟達三五一之要可煉大丹世人不圓斯旨只泥鼎器方寸尺度又何淺哉仲尼曰三五以變錯綜其數通其變遂成天地之文極其數遂定天下之象悟真篇云三五一都三個字古今明者實然稀東三南二同成五北一西方四共之戊已自居生數五三家相見結嬰兒嬰兒是一含真氣達者方能入聖機陰陽之數以氣為主五行之氣因數而生故東方靑氣九元也仁也木德生數三剛也精也古文龍虎經曰變化為靑龍陽木也南方赤氣二亨也禮也火德生數二柔也血也經曰丹砂流汞父陰火也陽木生陰火離為陽中之陰陰為中女則離女以震木為父是木為火侣其生數二與三同為一五也為砂中汞也為我也為鼎也紫陽云金鼎欲留朱裏汞是也四方白氣七利也義也金德生數四雌也液也經曰雌陰赭黃金陰金也北方黑氣五貞也智也水德生數一雄也氣也經曰雄陽翠玄水陽水也陰金生陽水坎為陰中之陽為中男則男以兌金為母是金與水同處其生數一與四同為一五也為水中金也為彼也器也紫陽云玉池先下水中銀是也中央黃氣一已也神也土德生數五戊也信也老子曰杳杳冥冥其中有精其精甚真其中有信是也戊已一合成圭二五之精妙合而凝者金丹凝結也是之謂三五一也是之謂鼎器也三五一總合而成九數以還東方靑氣之元數九是之謂九還大丹也口四八兩寸唇四與八合十二又加兩足一十四十四者是天上月之初圓月圓為純陽以其陽純方能生一陽之金精於鼎之內也口與唇為金氣相胥之門戶是謂鼎之口器之唇也是謂二七一十四也是之謂七返之妙義也世人不明仙翁妙諦藏妙中之妙有意外之意其見口與唇二字直欲求鼎器之尺寸者烏知金液大丹以乾坤為鼎器欲比量金丹鼎器之尺寸者是比量乾坤也且不知將何丈尺比量乾坤抑不知從何下手而比量也彼烏知煉丹法象以天地為爐以陰陽為火此之謂爐火即如人身一小天地以身為爐精氣為火郤非五金八石之爐火鼎器者也長尺二厚薄均尺二者一年十二月也長者年年有十二月也厚太過薄不及也修行人要知每年有十二月月月有金水相生之時鼎器厚則有望遠之嫌鼎器薄則有衰弱之患均者所以調之攝之調攝者審之候之也故先哲以一年七十二候攢簇於一日一時之內有六候則一候有三符止用一符之速是謂符候厚薄均調攝不差一髮方許煉大丹也腹齊三坐垂溫腹者丹鼎之內室也齊者與月齊光也三者必皆初三日也坐者待也垂者至也溫者陽氣動也何謂與月齊光蓋天上月號曰太陰每月初三日晡生一陽之光於庚申之上以象震卦震者微陽乘二陰也丹鼎亦然人間之鼎器號曰少陰亦每月初三之夕生一陽之氣於壬癸之鄉以象復卦復者一陽伏五陰也何謂坐垂溫修行者已得鼎器遇其初三之夕必坐而候之待其火氣垂至不寒不燥而溫然此其陽氣欲動急可煉丹也陰在上陽下奔陰乃器中之水陽乃鼎中之火水上火下水火既濟陰上陽下地天泰也紫陽翁云饒他為主我為賓是也首尾武中間文始七十終三旬三百六善調均首行武火煉已之時也尾行武火溫養之日也中間郤行一符之文火以煉丹也始七十積已之功最難為也終三旬者言溫養之際尤當愼也七十又三旬并二百六總三百六協乃四九之圓數一周之日足也比三百六十日以七分之日煉已以三分之日溫養如以一年溫養則先三年煉已惟中間煉丹之文火止要半箇時也故謂善調均其煉丹用半箇時中一符文火郤不在七十與三旬并二百六之列學者當詳首尾始終四字則中間文在外而不相干也世人每見七十與三旬之語皆為三分文七分武豈悟丹經藏機不敢直吐者也若洞曉一符之頃為得丹之候則中間文自融會矣陰火白黃芽鉛兩七聚輔翼人地二生火天七成砂此陰火之成數是一七也天一生水地六成鉛此黃芽之合數是一七也以鉛火之數合兩七聚也兩七一十四也以此十四之鉛火會於鼎器之中其功輔翼於人而成丹也膽理腦定玄升子處中得安存來去遊不出門漸成大性情純郤歸一還本原善愛敬如君臣至一周甚辛勤密防護莫迷昏途路遠復幽玄若達此會乾坤刀圭霑淨魄魂得長生居仙村樂道者尋其根審五行定銖分諦思之不須論深藏守莫傳文此假淺近言得藥之士更無怠荒暫時不離勤勤付囑句句明白不必再釋若丹已成嬰兒漸大不妨行九載向上之功也御白鶴駕龍鱗遊太虛謁仙君録天圖號真人此係丹成道備行滿功成之事然功高德重則效驗有不能盡述者緣夫至道上天所寶善根上智勤行不怠性命雙修形神俱妙與道合真德重功高一如懋贊之辭謁仙君而號真人也人人可以作此大功德成此大自在勿以事難而自棄勿以緣淺而不為老子張葛亦人爾非天上落下底釋迦達磨亦人爾非地下湧出底堅心勇猛事皆易成志士修行深思勉力補塞遺脫章第三十四參同契者敷陳梗概不能純一汛濫而説纎微未備闕略髣佛今更撰録補塞遺脫潤色幽深鈎援相逮旨意等齊所趣不悖故復作此命互相類則大易之性情盡矣乙浮右丁文火巳物辛世銀癸真鉛五位相得三木二火五土四金一水甲沉左丙武火戊藥庚世金壬真汞而各有合大易性情各如其度黃老用究較而可御爐火之事真有所據三道由一俱出徑路枝莖華葉果實垂布正在根株不失其素誠心所言審而不誤象彼仲冬節竹木皆摧傷佐陽詰賈旅人君深自藏象時順節令閉口不用談天道甚浩廣太玄無形容虛寂不可覩匡郭以消亡謬誤失事緒言還自敗傷别序斯四象以曉後生盲此章補塞遺脫中存口訣隱而不露注者到此當體獲麟之意况其戒云閉口不用談又云言還自敗傷一舉雙明其意遠矣是書有大解脫有大神通若得聞是書蛇虎不能傷得誦是書疫痢不能染得明是書地獄不拘攝得行是書天堂自快樂是書在處空中常有金光交射虛室生白人若見之延夀六六供養信受其福無邊况堅修而勤行乎自敘啓後章第三十五會稽鄙夫幽谷朽生挾懷朴素不樂權榮棲遲僻陋忽略利名執守恬淡希時安寧晏然間居乃撰斯文歌敘大易三聖遺言察其旨趣一統共論務在順理宣耀精神神化流通四海和平表以為厯萬世可循序以御政行之不繁引內養性黃老自然含德之厚歸根返元近在我心不離已身抱一毋舍可以長存配以伏食雄雌設陳挺除武都八石棄捐審用成物世俗所珍羅列三條枝莖相連同出異名皆由一門非徒纍句諧偶斯文殆有其真礫硌可觀使豫敷偽郤被贅愆命參同契微覽其端辭寡意大後嗣宜遵委時去害依託邱山循遊寥廓與鬼為鄰化形而仙淪寂無聲百世而下遨遊人間敷陳羽翮東西南傾湯遭厄際水旱隔并柯葉萎黃失其華榮吉人相乘負安穩可長生上陽子乃重宣此義而説偈曰安穩可長生長生無劫年大道難思議還丹奚變遷火煉金為體土尅水為圓初伏十六兩咽吞上下弦常配以伏食歸根而還原草木非同類金石皆棄捐審用窺造物世俗珍此鉛淸淨得真修殷勤蘄自然三聖寶金經積功善結緣氣煉玄元始太上命精延刀利高嵯峨育帝攝上玄泥丸耀神輝赫赤覆八騫大羅齊玉京丹鳳回翮躚洞章振九都鬼魔咸首愆楊枝甘露漿鋪敘聆其詮皓靈布元化劫劫金口宣齋戒誦一遍積逮沉疴痊七遍至九遍乾坤逆回旋百遍至千遍奏名玉帝前萬遍不輟休火裏生金蓮種民無色界給君度大千金童散天華玉女掌瓊筵靈風響層霄梵氣盈芝田五老勤籙籍四協較宸篇景霞蔭羽蓋太淸浮紫煙渺渺龍漢上銓功詣瑛鮮億劫亘綿綿金光煥萬天神霄九陽會洞妙高上仙
